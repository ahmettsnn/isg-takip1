<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>

<title>ISG Takip Sistemi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar h1{font-size:16px;font-weight:700;}
.breadcrumb{font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px;}
.bc-link{cursor:pointer;color:#1a5fa8;}.bc-link:hover{text-decoration:underline;}
.topbar-btns{display:flex;gap:8px;}
.btn{padding:7px 14px;font-size:13px;cursor:pointer;border-radius:8px;font-family:inherit;border:1px solid #e5e5e0;background:#fff;color:#1a1a18;white-space:nowrap;}
.btn:hover{background:#f0f0ea;}
.btn-primary{background:#1a5fa8;color:#fff;border-color:#1a5fa8;}

.btn-danger{background:#fef2f2;color:#991b1b;border-color:#fecaca;}

.btn-notif{position:relative;}
.ndot{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:#dc2626;border-radius:50%;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.container{max-width:1100px;margin:0 auto;padding:20px 16px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-size:24px;font-weight:700;}
.stat-label{font-size:11px;color:#888;margin-top:3px;}
.c-red{color:#dc2626;}.c-amber{color:#d97706;}.c-green{color:#16a34a;}.c-blue{color:#1a5fa8;}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 16px;border-bottom:1px solid #f0f0ea;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:15px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 12px;color:#888;font-weight:600;border-bottom:1px solid #e5e5e0;font-size:11px;white-space:nowrap;background:#fafaf8;}
tbody tr{border-bottom:1px solid #f0f0ea;}
tbody tr:hover{background:#fafaf8;}
tbody td{padding:9px 12px;vertical-align:middle;}
.ibtns{display:flex;gap:4px;flex-wrap:wrap;}
.ibtn{padding:3px 9px;font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit;border:1px solid #e5e5e0;background:transparent;color:#666;}
.ibtn:hover{background:#f0f0ea;}
.ibtn.del:hover{background:#fef2f2;color:#991b1b;border-color:#fecaca;}

.ibtn.warn:hover{background:#fef3c7;}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-red{background:#fef2f2;color:#991b1b;}
.badge-amber{background:#fffbeb;color:#92400e;}
.badge-green{background:#f0fdf4;color:#166534;}
.badge-blue{background:#eff6ff;color:#1e40af;}
.badge-gray{background:#f3f4f6;color:#4b5563;}
.badge-purple{background:#f5f3ff;color:#6d28d9;}
.badge-orange{background:#fff7ed;color:#c2410c;}
.ts-az{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;}
.ts-teh{background:#fffbeb;color:#92400e;border:1px solid #fde68a;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;}
.ts-cok{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;}
.inner-tabs{display:flex;border-bottom:2px solid #f0f0ea;margin-bottom:20px;overflow-x:auto;}

.itab.active{color:#1a5fa8;border-bottom-color:#1a5fa8;font-weight:600;}
.nav-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;}

.nav-tab.active{background:#1a5fa8;color:#fff;border-color:#1a5fa8;font-weight:600;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;}
.info-item label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.modal h2{font-size:17px;font-weight:600;margin-bottom:18px;}
.frow{margin-bottom:12px;}
.frow label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500;}
.frow input,.frow select,.frow textarea{width:100%;padding:8px 11px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;font-family:inherit;}

.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

.section-title{font-size:11px;font-weight:700;color:#aaa;margin:16px 0 10px;text-transform:uppercase;letter-spacing:.6px;padding-bottom:6px;border-bottom:1px solid #f0f0ea;}

.nbody{flex:1;}

.ndesc{font-size:12px;color:#888;margin-top:2px;}
.ndate{font-size:11px;color:#bbb;margin-top:2px;}
.empty-state{text-align:center;padding:40px 20px;color:#aaa;}
.personel-kart{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:20px;margin-bottom:16px;}
.kart-baslik{display:flex;align-items:center;gap:12px;margin-bottom:16px;}

.belge-satir:last-child{border-bottom:none;}
.belge-ad{font-size:13px;font-weight:600;min-width:140px;}
.belge-tarihler{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.tarih-grup{text-align:center;}
.tarih-grup .tlabel{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;}
.tarih-grup .tval{font-size:12px;font-weight:500;margin-top:2px;}
.bolum-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}

.avatar{width:40px;height:40px;border-radius:50%;background:#eff6ff;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-lg{width:72px;height:72px;border-radius:50%;background:#eff6ff;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;overflow:hidden;border:3px solid #e5e5e0;}
.avatar-lg img{width:100%;height:100%;object-fit:cover;}
.foto-upload-area{border:2px dashed #e5e5e0;border-radius:12px;padding:20px;text-align:center;cursor:pointer;}
.foto-upload-area:hover{border-color:#1a5fa8;}
.foto-upload-area input{display:none;}
.foto-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;border:3px solid #e5e5e0;}
.pasif-banner{background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;}
.pdf-satir{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f0f0ea;gap:8px;}
.pdf-satir:last-child{border-bottom:none;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>ISG Takip</h1>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="topbar-btns">
    <button class="btn btn-notif" onclick="openNotif()">
      Bildirimler <span class="ndot hidden" id="ndot">0</span>
    </button>
    <button class="btn btn-primary" id="add-btn" onclick="handleAdd()">+ Ekle</button>
  </div>
</div>

<div class="container" id="main"></div>

<div class="overlay hidden" id="ov">
  <div class="modal">
    <h2 id="mtitle"></h2>
    <div id="mbody"></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="save()">Kaydet</button>
    </div>
  </div>
</div>

<div class="overlay hidden" id="nov">
  <div class="npanel">
    <h2>Bildirimler <span id="ncnt" style="font-size:13px;font-weight:400;color:#aaa"></span></h2>
    <div id="nlist"></div>
    <div class="mfooter"><button class="btn" onclick="document.getElementById('nov').classList.add('hidden')">Kapat</button></div>
  </div>
</div>

<script>
const SURELER={
  az: {risk:5*365,acil:4*365,yangin:365,yillik_egitim:365,yillik_calisma:365,isg_egitim:3*365,saglik:5*365,ilkyardim:3*365,mesleki:5*365},
  teh:{risk:4*365,acil:4*365,yangin:365,yillik_egitim:365,yillik_calisma:365,isg_egitim:2*365,saglik:3*365,ilkyardim:3*365,mesleki:5*365},
  cok:{risk:2*365,acil:2*365,yangin:365,yillik_egitim:365,yillik_calisma:365,isg_egitim:365,saglik:365,ilkyardim:3*365,mesleki:5*365},
};
const FIRMA_MEVZUAT=[
  {key:'risk',label:'Risk Analizi'},{key:'acil',label:'Acil Durum Planı'},
  {key:'yangin',label:'Yangın Tatbikatı'},{key:'yillik_egitim',label:'Yıllık Eğitim Planı'},
  {key:'yillik_calisma',label:'Yıllık Çalışma Planı'},
];
const PERS_MEVZUAT=[
  {key:'ilkyardim',label:'İlk Yardım Eğitimi'},
  {key:'mesleki',label:'Mesleki Yeterlilik Belgesi'},
];
const ACIL_KURAL={az:{yangin:50,koruma:50,kurtarma:50,ilkyardim:20},teh:{yangin:40,koruma:40,kurtarma:40,ilkyardim:15},cok:{yangin:30,koruma:30,kurtarma:30,ilkyardim:10}};
const ACIL_EKIP=[{key:'yangin',label:'Yangın Söndürme Ekibi'},{key:'koruma',label:'Koruma Ekibi'},{key:'kurtarma',label:'Kurtarma Ekibi'},{key:'ilkyardim',label:'İlk Yardım Ekibi'}];
const TS_LABEL={az:'Az Tehlikeli',teh:'Tehlikeli',cok:'Çok Tehlikeli'};
const TS_CLASS={az:'ts-az',teh:'ts-teh',cok:'ts-cok'};

const today=new Date();today.setHours(0,0,0,0);
const addD=(d,n)=>{if(!d)return'';const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);};
const fmt=d=>d?new Date(d).toLocaleDateString('tr-TR'):'—';
const diff=d=>d?Math.floor((new Date(d)-today)/86400000):9999;
const st=d=>{if(!d)return'gray';const v=diff(d);return v<0?'red':v<=30?'amber':'green';};
const worst=a=>{const f=a.filter(x=>x!=='gray');if(!f.length)return'gray';return f.includes('red')?'red':f.includes('amber')?'amber':'green';};
const lbl=s=>s==='red'?'Süresi Geçmiş':s==='amber'?'30 Gün İçinde':s==='gray'?'Girilmedi':'Geçerli';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const ini=ad=>ad.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const gerekliEkip=(ts,key,sayi)=>Math.max(1,Math.ceil(sayi/(ACIL_KURAL[ts][key]||50)));
const mevcutEkip=(fid,key)=>personeller.filter(p=>p.fid===fid&&p.aktif&&(p.acilEkipler||[]).includes(key)).length;

// ============================================================
// VERİ
// ============================================================
let firmalar=[

   bolumler:['Şantiye','Ofis','Makine'],ozelEkipler:[],
   belgeler:[

     {id:'b2',ad:'Acil Durum Planı',tip:'mevzuat',key:'acil',hazirlik:addD(today,-10),bitis:addD(today,25)},
     {id:'b3',ad:'Yangın Tatbikatı',tip:'mevzuat',key:'yangin',hazirlik:addD(today,-60),bitis:addD(today,300)},
   ]},

   yetkili:'Ayşe Demir',telefon:'0312 444 0202',email:'info@xyz.com',
   bolumler:['Muhasebe','İnsan Kaynakları','IT'],ozelEkipler:[],
   belgeler:[{id:'b4',ad:'Risk Analizi',tip:'mevzuat',key:'risk',hazirlik:addD(today,-200),bitis:addD(today,180)}]},
  {id:'f3',ad:'Güven Kimya A.Ş.',nace:'2011',ts:'cok',vergi:'1122334455',sgk:'112233',adres:'İzmir / Bornova',
   yetkili:'Ali Güven',telefon:'0232 333 0303',email:'info@guvenkimya.com',
   bolumler:['Üretim','Laboratuvar','Depo'],ozelEkipler:[{key:'ozel_kimya',label:'Kimyasal Müdahale',gerekli:2}],
   belgeler:[
     {id:'b5',ad:'Risk Analizi',tip:'mevzuat',key:'risk',hazirlik:addD(today,-700),bitis:addD(today,-30)},
     {id:'b6',ad:'Acil Durum Planı',tip:'mevzuat',key:'acil',hazirlik:addD(today,-5),bitis:addD(today,-5)},
   ]},
];

let personeller=[
  {id:'p1',fid:'f1',aktif:true,bolum:'Şantiye',ad:'Ahmet Yılmaz',tc:'12345678901',dogum:'1985-03-15',
   ise_giris:'2018-06-01',cikis_tarihi:'',gorev:'Saha İşçisi',cinsiyet:'Erkek',medeni:'Evli',
   kan:'A Rh+',egitim:'Lise',telefon:'0532 111 2233',email:'ahmet@mail.com',adres:'Kadıköy / İstanbul',
   foto:'',acilEkipler:['yangin','kurtarma'],
   isg_tarih:addD(today,-380),saglik_tarih:addD(today,-30),
   belgeler:[{id:'pb1',ad:'Mesleki Yeterlilik',tip:'mevzuat',key:'mesleki',hazirlik:addD(today,-100),bitis:addD(today,400)}],
   pdfler:[]},
  {id:'p2',fid:'f1',aktif:true,bolum:'Şantiye',ad:'Fatma Kaya',tc:'23456789012',dogum:'1990-07-22',
   ise_giris:'2020-01-15',cikis_tarihi:'',gorev:'Kalıpçı',cinsiyet:'Kadın',medeni:'Bekar',

   foto:'',acilEkipler:['ilkyardim'],

   kan:'0 Rh+',egitim:'Lisans',telefon:'0534 333 4455',email:'kemal@mail.com',adres:'Beşiktaş / İstanbul',
   foto:'',acilEkipler:[],
   isg_tarih:addD(today,-50),saglik_tarih:addD(today,-100),
   belgeler:[],pdfler:[]},

   kan:'AB Rh+',egitim:'Lisans',telefon:'0535 444 5566',email:'zeynep@mail.com',adres:'Çankaya / Ankara',
   foto:'',acilEkipler:[],
   isg_tarih:addD(today,-100),saglik_tarih:addD(today,-200),
   belgeler:[],pdfler:[]},
  {id:'p5',fid:'f3',aktif:true,bolum:'Laboratuvar',ad:'Ayşe Şahin',tc:'45678901234',dogum:'1992-05-30',
   ise_giris:'2019-03-10',cikis_tarihi:'',gorev:'Kimyager',cinsiyet:'Kadın',medeni:'Bekar',
   kan:'A Rh-',egitim:'Lisans',telefon:'0536 555 6677',email:'ayse@mail.com',adres:'Bornova / İzmir',
   foto:'',acilEkipler:['yangin','ilkyardim'],
   isg_tarih:addD(today,-370),saglik_tarih:addD(today,-10),
   belgeler:[{id:'pb2',ad:'İlk Yardım Eğitimi',tip:'mevzuat',key:'ilkyardim',hazirlik:addD(today,-20),bitis:addD(today,5)}],
   pdfler:[{id:'pdf1',ad:'İlk Yardım Sertifikası',tarih:addD(today,-20),not:'2024 yılı'}]},
];

// ============================================================
// DURUM
// ============================================================
let curView='home',curFirmaId=null,curTab='belgeler',curPersonelId=null;
let curBolumFilter='hepsi',curPersonelTab='aktif';
let editId=null,editType=null,editSubType=null;

// ============================================================
// YARDIMCI
// ============================================================
const persIsgBitis=p=>{const f=firmalar.find(x=>x.id===p.fid);return(f&&p.isg_tarih)?addD(p.isg_tarih,SURELER[f.ts].isg_egitim):'';};
const persSaglikBitis=p=>{const f=firmalar.find(x=>x.id===p.fid);return(f&&p.saglik_tarih)?addD(p.saglik_tarih,SURELER[f.ts].saglik):'';};
function avatarHtml(p,size='sm'){
  const cls=size==='lg'?'avatar-lg':'avatar';
  if(p.foto)return`<div class="${cls}"><img src="${p.foto}" alt="${p.ad}"/></div>`;
  return`<div class="${cls}">${ini(p.ad)}</div>`;
}

// ============================================================
// RENDER
// ============================================================
function render(){
  if(curView==='home')renderHome();
  else if(curView==='firma')renderFirma();
  else if(curView==='personel')renderPersonelDetay();
  else if(curView==='cikanlar')renderCikanlar();
}

// ---------- ANA SAYFA ----------
function renderHome(){
  updateBreadcrumb([]);
  document.getElementById('add-btn').textContent='+ Firma Ekle';
  const gs=calcGlobalStats();
  let h=`<div class="stats">
    <div class="stat"><div class="stat-num c-red">${gs.exp}</div><div class="stat-label">Süresi Geçmiş</div></div>
    <div class="stat"><div class="stat-num c-amber">${gs.son}</div><div class="stat-label">30 Günde Doluyor</div></div>
    <div class="stat"><div class="stat-num c-green">${gs.ok}</div><div class="stat-label">Geçerli</div></div>
    <div class="stat"><div class="stat-num c-blue">${firmalar.length}</div><div class="stat-label">İşyeri</div></div>

  firmalar.forEach(f=>{
    const pc=personeller.filter(p=>p.fid===f.id&&p.aktif).length;
    const allSt=[...f.belgeler.map(b=>st(b.bitis))];
    personeller.filter(p=>p.fid===f.id&&p.aktif).forEach(p=>{allSt.push(st(persIsgBitis(p)),st(persSaglikBitis(p)));p.belgeler.forEach(b=>allSt.push(st(b.bitis)));});
    const bs=worst(allSt);
    h+=`<tr style="cursor:pointer" onclick="goFirma('${f.id}')">
      <td style="font-weight:600">${f.ad}</td>
      <td style="color:#888">${f.nace||'—'}</td>
      <td><span class="${TS_CLASS[f.ts]}">${TS_LABEL[f.ts]}</span></td>
      <td style="color:#888;font-size:12px">${f.yetkili||'—'}</td>

    </tr>`;

  if(!firmalar.length)h+=`<tr><td colspan="7" class="empty-state">Henüz işyeri yok.</td></tr>`;
  h+=`</tbody></table></div>`;
  document.getElementById('main').innerHTML=h;

// ---------- FİRMA ----------
function renderFirma(){
  const f=firmalar.find(x=>x.id===curFirmaId);
  if(!f){goHome();return;}
  updateBreadcrumb([{label:f.ad}]);
  let h=`<div class="inner-tabs">
    <button class="itab ${curTab==='bilgiler'?'active':''}"    onclick="switchTab('bilgiler')">Firma Bilgileri</button>
    <button class="itab ${curTab==='belgeler'?'active':''}"    onclick="switchTab('belgeler')">Firma Belgeleri</button>
    <button class="itab ${curTab==='personeller'?'active':''}" onclick="switchTab('personeller')">Personeller</button>
  </div>`;
  if(curTab==='bilgiler')h+=renderBilgiler(f);
  else if(curTab==='belgeler')h+=renderFirmaBelgeler(f);
  else h+=renderPersonelListesi(f);
  document.getElementById('main').innerHTML=h;
  updateBadge();
}

      <div class="info-item"><label>Tehlike Sınıfı</label><div class="val"><span class="${TS_CLASS[f.ts]}">${TS_LABEL[f.ts]}</span></div></div>
      <div class="info-item"><label>NACE Kodu</label><div class="val">${f.nace||'—'}</div></div>
      <div class="info-item"><label>Vergi Kimlik No</label><div class="val">${f.vergi||'—'}</div></div>
      <div class="info-item"><label>SGK Sicil No</label><div class="val">${f.sgk||'—'}</div></div>
      <div class="info-item"><label>Firma Yetkilisi</label><div class="val">${f.yetkili||'—'}</div></div>
      <div class="info-item"><label>Telefon</label><div class="val">${f.telefon||'—'}</div></div>
      <div class="info-item"><label>E-posta</label><div class="val">${f.email||'—'}</div></div>
      <div class="info-item"><label>Adres</label><div class="val">${f.adres||'—'}</div></div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="section-title" style="margin:0;border:none">Bölümler</div>

      </div>
    </div>

    <div style="margin-top:18px;padding-top:16px;border-top:1px solid #f0f0ea;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="section-title" style="margin:0;border:none">Acil Durum Ekipleri</div>

        ${tumEkipler.map(e=>{
          const mevcut=mevcutEkip(f.id,e.key);
          const gerekli=e.gerekli||gerekliEkip(f.ts,e.key,pSayisi);
          const tamam=mevcut>=gerekli;
          const kural=ACIL_KURAL[f.ts]?.[e.key];
          return `<div style="background:${tamam?'#f0fdf4':'#fef2f2'};border:1px solid ${tamam?'#bbf7d0':'#fecaca'};border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;">

              <div style="font-size:22px;font-weight:700;color:${tamam?'#16a34a':'#dc2626'}">${mevcut}/${gerekli}</div>

function renderFirmaBelgeler(f){
  document.getElementById('add-btn').textContent='+ Belge Ekle';
  if(!f.belgeler.length)return`<div class="card"><div class="empty-state"><p>Henüz belge yok.</p><br><button class="btn btn-primary" onclick="openBelgeModal()">+ İlk Belgeyi Ekle</button></div></div>`;
  let h=`<div class="card"><table>
    <thead><tr><th>Belge Adı</th><th>Tür</th><th>Hazırlanma</th><th>Bitiş</th><th>Durum</th><th>Kalan</th><th></th></tr></thead><tbody>`;
  f.belgeler.forEach(b=>{
    const s=st(b.bitis);const d=diff(b.bitis);
    const k=!b.bitis?'—':d<0?`${Math.abs(d)} gün geçti`:`${d} gün kaldı`;
    h+=`<tr>
      <td style="font-weight:600">${b.ad}</td>
      <td><span class="badge ${b.tip==='mevzuat'?'badge-blue':'badge-gray'}">${b.tip==='mevzuat'?'Mevzuat':'Manuel'}</span></td>
      <td style="color:#888">${fmt(b.hazirlik)}</td><td>${fmt(b.bitis)}</td>
      <td><span class="badge badge-${s}">${lbl(s)}</span></td>
      <td style="color:${s==='red'?'#dc2626':s==='amber'?'#d97706':'#16a34a'};font-weight:500;font-size:12px">${k}</td>
      <td><div class="ibtns">
        <button class="ibtn" onclick="openBelgeModal('${b.id}')">Düzenle</button>
        <button class="ibtn del" onclick="delBelge('${f.id}','${b.id}')">Sil</button>
      </div></td>
    </tr>`;

function renderPersonelListesi(f){
  document.getElementById('add-btn').textContent='+ Personel Ekle';
  const psAktif=personeller.filter(p=>p.fid===f.id&&p.aktif);
  const bolumler=f.bolumler||[];
  let h=`<div class="bolum-filter">
    <span style="font-size:12px;color:#888;font-weight:600">Bölüm:</span>
    <button class="bolum-chip ${curBolumFilter==='hepsi'?'active':''}" onclick="setBolumFilter('hepsi')">Tümü (${psAktif.length})</button>
    ${bolumler.map(b=>{const c=psAktif.filter(p=>p.bolum===b).length;return`<button class="bolum-chip ${curBolumFilter===b?'active':''}" onclick="setBolumFilter('${b}')">${b} (${c})</button>`;}).join('')}
    ${psAktif.some(p=>!p.bolum||!bolumler.includes(p.bolum))?`<button class="bolum-chip ${curBolumFilter==='diger'?'active':''}" onclick="setBolumFilter('diger')">Atanmamış</button>`:''}
  </div>`;
  let filtrelenmis=psAktif;
  if(curBolumFilter==='diger')filtrelenmis=psAktif.filter(p=>!p.bolum||!bolumler.includes(p.bolum));
  else if(curBolumFilter!=='hepsi')filtrelenmis=psAktif.filter(p=>p.bolum===curBolumFilter);
  if(!filtrelenmis.length){
    h+=`<div class="card"><div class="empty-state"><p>${psAktif.length?'Bu bölümde personel yok.':'Henüz personel yok.'}</p>${!psAktif.length?'<br><button class="btn btn-primary" onclick="openPersonelModal()">+ İlk Personeli Ekle</button>':''}</div></div>`;
    return h;
  }
  if(curBolumFilter==='hepsi'&&bolumler.length>0){
    const gruplar={};
    filtrelenmis.forEach(p=>{const b=(p.bolum&&bolumler.includes(p.bolum))?p.bolum:'Atanmamış';if(!gruplar[b])gruplar[b]=[];gruplar[b].push(p);});
    const sira=[...bolumler];if(gruplar['Atanmamış'])sira.push('Atanmamış');
    h+=`<div class="card">`;
    sira.forEach(ba=>{
      if(!gruplar[ba]||!gruplar[ba].length)return;
      h+=`<div class="bolum-group-header">${ba} — ${gruplar[ba].length} kişi</div>`;
      h+=`<table><thead><tr><th style="width:44px"></th><th>Ad Soyad</th><th>Görevi</th><th>İSG Bitiş</th><th>Sağlık Bitiş</th><th>Durum</th><th></th></tr></thead><tbody>`;
      gruplar[ba].forEach(p=>{h+=pSatir(p,false);});
      h+=`</tbody></table>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="card"><table><thead><tr><th style="width:44px"></th><th>Ad Soyad</th><th>Bölüm</th><th>Görevi</th><th>İSG Bitiş</th><th>Sağlık Bitiş</th><th>Durum</th><th></th></tr></thead><tbody>`;
    filtrelenmis.forEach(p=>{h+=pSatir(p,true);});
    h+=`</tbody></table></div>`;
  }
  return h;
}

function pSatir(p,showBolum){
  const ib=persIsgBitis(p);const sb=persSaglikBitis(p);
  const ov=worst([st(ib),st(sb),...p.belgeler.map(b=>st(b.bitis))]);
  return `<tr style="cursor:pointer" onclick="goPersonel('${p.id}')">
    <td>${avatarHtml(p)}</td>
    <td style="font-weight:600">${p.ad}</td>
    ${showBolum?`<td><span class="badge badge-purple">${p.bolum||'—'}</span></td>`:''}
    <td style="color:#888;font-size:12px">${p.gorev||'—'}</td>
    <td><span class="badge badge-${st(ib)}">${fmt(ib)||'Girilmedi'}</span></td>
    <td><span class="badge badge-${st(sb)}">${fmt(sb)||'Girilmedi'}</span></td>
    <td><span class="badge badge-${ov}">${lbl(ov)}</span></td>
    <td onclick="event.stopPropagation()"><div class="ibtns">
      <button class="ibtn" onclick="goPersonel('${p.id}')">Detay</button>
      <button class="ibtn" onclick="openPersonelModal('${p.id}')">Düzenle</button>
      <button class="ibtn warn" onclick="istenCikar('${p.id}')">Çıkış</button>
      <button class="ibtn del" onclick="delPersonel('${p.id}')">Sil</button>
    </div></td>
  </tr>`;
}

        </div></td>
      </tr>`;
    });
    h+=`</tbody></table>`;
  }
  h+=`</div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Evraklar / PDF Dosyaları</span>
      ${p.aktif?`<button class="btn btn-primary" style="font-size:12px;padding:5px 12px" onclick="openPdfModal('${p.id}')">+ Evrak Ekle</button>`:''}
    </div>`;
  if(!(p.pdfler||[]).length){
    h+=`<div style="padding:24px;text-align:center;color:#aaa;font-size:13px">Henüz evrak eklenmemiş.</div>`;
  }else{
    p.pdfler.forEach(pdf=>{
      h+=`<div class="pdf-satir">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;background:#fef2f2;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">📄</div>
          <div>
            <div style="font-size:13px;font-weight:600">${pdf.ad}</div>
            <div style="font-size:11px;color:#aaa">${fmt(pdf.tarih)}${pdf.not?' &middot; '+pdf.not:''}</div>

        </div>
        ${p.aktif?`<div class="ibtns">
          <button class="ibtn del" onclick="delPdf('${p.id}','${pdf.id}')">Sil</button>
        </div>`:''}
      </div>`;
    });
  }
  h+=`</div>`;
  document.getElementById('main').innerHTML=h;
  updateBadge();
}

// ============================================================
// STATS & BİLDİRİM
// ============================================================
function calcGlobalStats(){
  let exp=0,son=0,ok=0;
  firmalar.forEach(f=>f.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;}));
  personeller.filter(p=>p.aktif).forEach(p=>{
    [persIsgBitis(p),persSaglikBitis(p)].forEach(d=>{const s=st(d);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
    p.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
  });
  return{exp,son,ok};
}
function getAlerts(){
  const a=[];
  firmalar.forEach(f=>f.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red'||s==='amber')a.push({type:s,name:f.ad,cat:'Firma',evrak:b.ad,tarih:b.bitis,dif:diff(b.bitis)});}));
  personeller.filter(p=>p.aktif).forEach(p=>{
    const f=firmalar.find(x=>x.id===p.fid);
    [{evrak:'İSG Eğitimi',tarih:persIsgBitis(p)},{evrak:'Sağlık Raporu',tarih:persSaglikBitis(p)},...p.belgeler.map(b=>({evrak:b.ad,tarih:b.bitis}))]
      .forEach(c=>{const s=st(c.tarih);if(s==='red'||s==='amber')a.push({type:s,name:p.ad,cat:'Personel',sub:f?f.ad:'',evrak:c.evrak,tarih:c.tarih,dif:diff(c.tarih)});});
  });
  return a.sort((a,b)=>a.dif-b.dif);
}
function updateBadge(){const n=getAlerts().length;const d=document.getElementById('ndot');if(n>0){d.textContent=n;d.classList.remove('hidden');}else d.classList.add('hidden');}
function openNotif(){
  const alerts=getAlerts();
  document.getElementById('ncnt').textContent=alerts.length?`(${alerts.length} uyarı)`:'';
  let h='';
  if(!alerts.length)h='<div style="text-align:center;padding:24px;color:#aaa">Tüm evraklar geçerli!</div>';
  else alerts.forEach(a=>{
    const desc=a.dif<0?`${Math.abs(a.dif)} gün önce sona erdi`:`${a.dif} gün içinde sona erecek`;
    h+=`<div class="nitem"><div class="navt ${a.type}">${ini(a.name)}</div><div class="nbody">
      <div class="nname">${a.name}${a.sub?` <span style="font-weight:400;color:#aaa;font-size:11px">(${a.sub})</span>`:''}</div>
      <div class="ndesc">${a.evrak} &middot; ${a.cat}</div>
      <div class="ndate">${fmt(a.tarih)} &middot; ${desc}</div>
    </div><span class="badge badge-${a.type}">${a.type==='red'?'Geçmiş':'Yakın'}</span></div>`;
  });
  document.getElementById('nlist').innerHTML=h;
  document.getElementById('nov').classList.remove('hidden');
}

function istenCikar(pid){
  const p=personeller.find(x=>x.id===pid);
  if(!p)return;
  const tarih=prompt(`${p.ad} için işten çıkış tarihini girin (YYYY-AA-GG):`,today.toISOString().slice(0,10));
  if(tarih===null)return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(tarih)){alert('Geçersiz tarih formatı. YYYY-AA-GG kullanın.');return;}
  if(!confirm(`${p.ad} işten çıkışı onaylıyor musunuz?\nÇıkış tarihi: ${fmt(tarih)}`))return;
  p.aktif=false;
  p.cikis_tarihi=tarih;
  if(curView==='personel')renderPersonelDetay();
  else render();
}
function geriAl(pid){
  const p=personeller.find(x=>x.id===pid);
  if(!p)return;
  if(!confirm(`${p.ad} personeli tekrar aktif yapılsın mı?`))return;
  p.aktif=true;p.cikis_tarihi='';
  render();
}

  if(curView==='home'||curView==='cikanlar')openFirmaModal();

  const bitis=addD(haz,gun);
  document.getElementById('b-bitis').value=bitis;
  const h=document.getElementById('b-hint');h.textContent=`Otomatik: ${fmt(bitis)}`;h.classList.remove('hidden');
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;">
      ${tumEkipler.map(e=>`
        <label style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e5e5e0;border-radius:8px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="ae-${e.key}" value="${e.key}" ${mevcutAtamalar.includes(e.key)?'checked':''} style="width:auto;accent-color:#1a5fa8"/>
          ${e.label}
        </label>`).join('')}
    </div>
    <div class="section-title">Zorunlu Belge Tarihleri <span style="font-weight:400;text-transform:none;font-size:11px;color:#888">— yapıldığı tarihi girin (${f?TS_LABEL[f.ts]:'—'})</span></div>
    <div class="fgrid">
      <div class="frow">
        <label>İSG Eğitim Tarihi</label>
        <input id="p-isg" type="date" value="${p?p.isg_tarih:''}" oninput="calcPBitis('isg')"/>
        <div class="hint hidden" id="hint-isg"></div>
      </div>
      <div class="frow">
        <label>Sağlık Raporu Tarihi</label>
        <input id="p-saglik" type="date" value="${p?p.saglik_tarih:''}" oninput="calcPBitis('saglik')"/>
        <div class="hint hidden" id="hint-saglik"></div>
      </div>
    </div>`;
  document.getElementById('ov').classList.remove('hidden');
  if(p&&p.isg_tarih)calcPBitis('isg');
  if(p&&p.saglik_tarih)calcPBitis('saglik');
}
function calcPBitis(tip){
  const f=firmalar.find(x=>x.id===curFirmaId);if(!f)return;
  const tarih=document.getElementById('p-'+tip).value;if(!tarih)return;
  const gun=tip==='isg'?SURELER[f.ts].isg_egitim:SURELER[f.ts].saglik;
  const bitis=addD(tarih,gun);
  const hint=document.getElementById('hint-'+tip);
  hint.textContent=`Bitiş: ${fmt(bitis)} (${gun/365} yıl)`;hint.classList.remove('hidden');
}

// ============================================================
// MODAL: PERSONEL EK BELGESİ
// ============================================================
function openPersonelBelgeModal(pid,bid){
  editId=bid||null;editType='personel-belge';editSubType=pid;
  const p=personeller.find(x=>x.id===pid);
  const f=firmalar.find(x=>x.id===(p?p.fid:curFirmaId));
  const b=bid&&p?p.belgeler.find(x=>x.id===bid):null;
  document.getElementById('mtitle').textContent=bid?'Ek Belgeyi Düzenle':'Yeni Ek Belge Ekle';
  const mevOpts=PERS_MEVZUAT.map(m=>`<option value="mevzuat_${m.key}" ${b&&b.tip==='mevzuat'&&b.key===m.key?'selected':''}>${m.label} (mevzuat)</option>`).join('');
  document.getElementById('mbody').innerHTML=`
    <div class="mevzuat-note">İSG Eğitimi ve Sağlık Raporu personel formundan yönetilir.</div>
    <div class="frow"><label>Belge Türü</label>
      <select id="pb-tip" onchange="onPBTipChange('${pid}')">
        ${mevOpts}
        <option value="manuel" ${b&&b.tip==='manuel'?'selected':''}>Diğer / Özel Belge</option>
      </select>
    </div>
    <div class="frow hidden" id="pb-ad-row"><label>Belge Adı</label><input id="pb-ad" value="${b&&b.tip==='manuel'?b.ad:''}" placeholder="Operatör Sertifikası..."/></div>
    <div class="fgrid">
      <div class="frow"><label>Hazırlanma Tarihi</label><input id="pb-hazirlik" type="date" value="${b?b.hazirlik:''}" oninput="calcPBBitis('${pid}')"/></div>
      <div class="frow hidden" id="pb-sure-row"><label>Geçerlilik Süresi</label>
        <select id="pb-sure" oninput="calcPBBitis('${pid}')">
          <option value="90">3 Ay</option><option value="180">6 Ay</option>
          <option value="365" selected>1 Yıl</option><option value="730">2 Yıl</option>
          <option value="1095">3 Yıl</option><option value="1460">4 Yıl</option><option value="1825">5 Yıl</option>
        </select>
      </div>
    </div>
    <div class="frow"><label>Bitiş Tarihi</label><input id="pb-bitis" type="date" value="${b?b.bitis:''}"/>
      <div class="hint hidden" id="pb-hint"></div>
      <div class="hint-neutral">Otomatik hesaplanır; isterseniz değiştirebilirsiniz.</div>
    </div>`;
  document.getElementById('ov').classList.remove('hidden');
  onPBTipChange(pid);
}
function onPBTipChange(pid){
  const v=document.getElementById('pb-tip').value;const isM=v==='manuel';
  document.getElementById('pb-ad-row').classList.toggle('hidden',!isM);
  document.getElementById('pb-sure-row').classList.toggle('hidden',!isM);
  calcPBBitis(pid);
}
function calcPBBitis(pid){
  const p=personeller.find(x=>x.id===pid);
  const f=firmalar.find(x=>x.id===(p?p.fid:curFirmaId));if(!f)return;
  const v=document.getElementById('pb-tip').value;
  const haz=document.getElementById('pb-hazirlik').value;if(!haz)return;
  const gun=v.startsWith('mevzuat_')?SURELER[f.ts][v.replace('mevzuat_','')]||365:parseInt(document.getElementById('pb-sure').value)||365;
  const bitis=addD(haz,gun);
  document.getElementById('pb-bitis').value=bitis;
  const h=document.getElementById('pb-hint');h.textContent=`Otomatik: ${fmt(bitis)}`;h.classList.remove('hidden');
}

// ============================================================
// MODAL: PDF / EVRAK
// ============================================================
function openPdfModal(pid){
  editId=null;editType='pdf';editSubType=pid;
  document.getElementById('mtitle').textContent='Evrak Ekle';
  document.getElementById('mbody').innerHTML=`
    <div class="hint-neutral" style="margin-bottom:12px">Evrak adı ve tarihini girin. PDF dosyası ilerleyen dönemde sisteme yüklenebilecek.</div>
    <div class="frow"><label>Evrak Adı</label><input id="pdf-ad" placeholder="İlk Yardım Sertifikası, MYK Belgesi..."/></div>
    <div class="frow"><label>Belge Tarihi</label><input id="pdf-tarih" type="date" value="${today.toISOString().slice(0,10)}"/></div>
    <div class="frow"><label>Not (isteğe bağlı)</label><input id="pdf-not" placeholder="Belge no, açıklama..."/></div>`;
  document.getElementById('ov').classList.remove('hidden');
}
function delPdf(pid,pdfId){
  if(!confirm('Bu evrakı silmek istediğinizden emin misiniz?'))return;
  const p=personeller.find(x=>x.id===pid);
  if(p){p.pdfler=(p.pdfler||[]).filter(x=>x.id!==pdfId);goPersonel(pid);}
}

// ============================================================
// MODAL: FOTOĞRAF
// ============================================================
function openFotoModal(pid){
  editId=pid;editType='foto';
  const p=personeller.find(x=>x.id===pid);
  document.getElementById('mtitle').textContent='Profil Fotoğrafı';
  document.getElementById('mbody').innerHTML=`
    <div class="foto-upload-area" onclick="document.getElementById('foto-input').click()">
      ${p.foto?`<img src="${p.foto}" class="foto-preview" id="fprev"/>`:`<div id="fprev" style="width:80px;height:80px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#1e40af;margin:0 auto 10px;">${ini(p.ad)}</div>`}
      <div style="font-size:13px;color:#888">Fotoğraf seçmek için tıklayın</div>
      <div style="font-size:11px;color:#aaa;margin-top:4px">JPG veya PNG, max 2MB</div>
      <input type="file" id="foto-input" accept="image/*" onchange="onFotoSecildi(this,'${pid}')"/>
    </div>
    ${p.foto?`<div style="margin-top:12px;text-align:center"><button class="ibtn del" onclick="fotoyuSil('${pid}')">Fotoğrafı Kaldır</button></div>`:''}`;
  document.getElementById('ov').classList.remove('hidden');
}
function onFotoSecildi(input,pid){
  const file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){alert('Dosya 2MB\'dan büyük olamaz!');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const src=e.target.result;
    const el=document.getElementById('fprev');
    if(el.tagName==='IMG')el.src=src;
    else{const img=document.createElement('img');img.src=src;img.className='foto-preview';img.id='fprev';el.replaceWith(img);}
    personeller.find(x=>x.id===pid).foto=src;
  };
  reader.readAsDataURL(file);
}
function fotoyuSil(pid){
  const p=personeller.find(x=>x.id===pid);if(p)p.foto='';
  closeModal();if(curView==='personel')renderPersonelDetay();else render();
}

// ============================================================
// KAYDET
// ============================================================
function closeModal(){document.getElementById('ov').classList.add('hidden');editId=null;editType=null;editSubType=null;}
function save(){
  if(editType==='firma')saveFirma();
  else if(editType==='bolum'||editType==='ozel-ekip'){closeModal();if(curView==='firma')renderFirma();else render();}
  else if(editType==='foto')closeModal();
  else if(editType==='firma-belge')saveFirmaBelge();
  else if(editType==='personel')savePersonel();
  else if(editType==='personel-belge')savePersonelBelge();
  else if(editType==='pdf')savePdf();
}

function saveFirma(){
  const ad=document.getElementById('f-ad').value.trim();if(!ad){alert('Firma adı zorunlu!');return;}
  const data={ad,ts:document.getElementById('f-ts').value,nace:document.getElementById('f-nace').value.trim(),vergi:document.getElementById('f-vergi').value.trim(),sgk:document.getElementById('f-sgk').value.trim(),yetkili:document.getElementById('f-yetkili').value.trim(),telefon:document.getElementById('f-telefon').value.trim(),email:document.getElementById('f-email').value.trim(),adres:document.getElementById('f-adres').value.trim()};
  if(editId)Object.assign(firmalar.find(x=>x.id===editId),data);
  else firmalar.push({id:uid(),...data,bolumler:[],ozelEkipler:[],belgeler:[]});
  closeModal();render();
}

function saveFirmaBelge(){
  const f=firmalar.find(x=>x.id===curFirmaId);if(!f)return;
  const tipVal=document.getElementById('b-tip').value;
  const hazirlik=document.getElementById('b-hazirlik').value;
  const bitis=document.getElementById('b-bitis').value;
  if(!hazirlik||!bitis){alert('Tarihler zorunlu!');return;}
  let rec;
  if(tipVal.startsWith('mevzuat_')){
    const key=tipVal.replace('mevzuat_','');
    rec={id:editId||uid(),ad:FIRMA_MEVZUAT.find(m=>m.key===key)?.label||key,tip:'mevzuat',key,hazirlik,bitis};
  }else{
    const ad=document.getElementById('b-ad').value.trim();if(!ad){alert('Belge adı zorunlu!');return;}
    rec={id:editId||uid(),ad,tip:'manuel',sure:parseInt(document.getElementById('b-sure').value),hazirlik,bitis};
  }
  if(editId){const i=f.belgeler.findIndex(x=>x.id===editId);f.belgeler[i]=rec;}else f.belgeler.push(rec);
  closeModal();renderFirma();
}

function savePersonel(){
  const ad=document.getElementById('p-ad').value.trim();if(!ad){alert('Ad Soyad zorunlu!');return;}
  const f=firmalar.find(x=>x.id===curFirmaId);
  const ozelEkipler=f?f.ozelEkipler||[]:[];
  const tumEkipKeys=[...ACIL_EKIP,...ozelEkipler].map(e=>e.key);
  const acilEkipler=tumEkipKeys.filter(k=>{const el=document.getElementById('ae-'+k);return el&&el.checked;});
  const data={ad,tc:document.getElementById('p-tc').value.trim(),dogum:document.getElementById('p-dogum').value,cinsiyet:document.getElementById('p-cinsiyet').value,medeni:document.getElementById('p-medeni').value,kan:document.getElementById('p-kan').value,egitim:document.getElementById('p-egitim').value,telefon:document.getElementById('p-telefon').value.trim(),email:document.getElementById('p-email').value.trim(),ise_giris:document.getElementById('p-ise').value,gorev:document.getElementById('p-gorev').value.trim(),bolum:document.getElementById('p-bolum').value,adres:document.getElementById('p-adres').value.trim(),isg_tarih:document.getElementById('p-isg').value,saglik_tarih:document.getElementById('p-saglik').value,acilEkipler};
  if(editId)Object.assign(personeller.find(x=>x.id===editId),data);
  else personeller.push({id:uid(),fid:curFirmaId,...data,aktif:true,cikis_tarihi:'',foto:'',belgeler:[],pdfler:[]});
  closeModal();
  if(curView==='personel')renderPersonelDetay();else render();
}

function savePersonelBelge(){
  const pid=editSubType;const p=personeller.find(x=>x.id===pid);if(!p)return;
  const tipVal=document.getElementById('pb-tip').value;
  const hazirlik=document.getElementById('pb-hazirlik').value;
  const bitis=document.getElementById('pb-bitis').value;
  if(!hazirlik||!bitis){alert('Tarihler zorunlu!');return;}
  let rec;
  if(tipVal.startsWith('mevzuat_')){
    const key=tipVal.replace('mevzuat_','');
    rec={id:editId||uid(),ad:PERS_MEVZUAT.find(m=>m.key===key)?.label||key,tip:'mevzuat',key,hazirlik,bitis};
  }else{
    const ad=document.getElementById('pb-ad').value.trim();if(!ad){alert('Belge adı zorunlu!');return;}
    rec={id:editId||uid(),ad,tip:'manuel',sure:parseInt(document.getElementById('pb-sure').value),hazirlik,bitis};
  }
  if(editId){const i=p.belgeler.findIndex(x=>x.id===editId);p.belgeler[i]=rec;}else p.belgeler.push(rec);
  closeModal();goPersonel(pid);
}

function savePdf(){
  const pid=editSubType;const p=personeller.find(x=>x.id===pid);if(!p)return;
  const ad=document.getElementById('pdf-ad').value.trim();
  if(!ad){alert('Evrak adı zorunlu!');return;}
  const tarih=document.getElementById('pdf-tarih').value;
  const not=document.getElementById('pdf-not').value.trim();
  if(!p.pdfler)p.pdfler=[];
  p.pdfler.push({id:uid(),ad,tarih,not});
  closeModal();goPersonel(pid);
}

// ============================================================
// SİL
// ============================================================
function delFirma(id){
  if(!confirm('Bu firmayı ve tüm personellerini silmek istediğinizden emin misiniz?'))return;
  firmalar=firmalar.filter(x=>x.id!==id);
  personeller=personeller.filter(x=>x.fid!==id);
  render();
}
function delBelge(fid,bid){
  if(!confirm('Bu belgeyi silmek istediğinizden emin misiniz?'))return;
  const f=firmalar.find(x=>x.id===fid);if(f)f.belgeler=f.belgeler.filter(x=>x.id!==bid);
  renderFirma();
}
function delPersonel(id){
  if(!confirm('Bu personeli kalıcı olarak silmek istediğinizden emin misiniz?'))return;
  personeller=personeller.filter(x=>x.id!==id);render();
}
function delPersonelBelge(pid,bid){
  if(!confirm('Bu belgeyi silmek istediğinizden emin misiniz?'))return;
  const p=personeller.find(x=>x.id===pid);
  if(p){p.belgeler=p.belgeler.filter(x=>x.id!==bid);goPersonel(pid);}
}

render();
</script>
</body>
</html>
