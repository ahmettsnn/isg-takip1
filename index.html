<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISG Takip Sistemi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:17px;font-weight:600;}
.topbar-btns{display:flex;gap:8px;}
.container{max-width:1100px;margin:0 auto;padding:24px 16px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px;}
.stat{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:16px;text-align:center;}
.stat-num{font-size:26px;font-weight:700;}
.stat-label{font-size:12px;color:#888;margin-top:4px;}
.red{color:#dc2626;}.amber{color:#d97706;}.green{color:#16a34a;}
.tabs{display:flex;gap:0;border:1px solid #e5e5e0;border-radius:8px;overflow:hidden;width:fit-content;margin-bottom:16px;}
.tab{padding:8px 20px;font-size:14px;cursor:pointer;background:#fff;border:none;color:#888;font-family:inherit;}
.tab.active{background:#f0f0ea;color:#1a1a18;font-weight:600;}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input,.toolbar select{flex:1;min-width:160px;padding:8px 12px;border:1px solid #e5e5e0;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;}
.btn{padding:8px 16px;font-size:14px;cursor:pointer;border-radius:8px;font-family:inherit;border:1px solid #e5e5e0;background:#fff;color:#1a1a18;white-space:nowrap;}
.btn:hover{background:#f0f0ea;}
.btn-primary{background:#1a5fa8;color:#fff;border-color:#1a5fa8;}
.btn-primary:hover{background:#154d8a;}
.btn-notif{position:relative;}
.ndot{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:#dc2626;border-radius:50%;font-size:11px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 12px;color:#888;font-weight:600;border-bottom:1px solid #e5e5e0;font-size:12px;white-space:nowrap;background:#fafaf8;}
tbody tr{border-bottom:1px solid #f0f0ea;}
tbody tr:hover{background:#fafaf8;}
tbody td{padding:10px 12px;white-space:nowrap;}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-red{background:#fef2f2;color:#991b1b;}
.badge-amber{background:#fffbeb;color:#92400e;}
.badge-green{background:#f0fdf4;color:#166534;}
.ibtns{display:flex;gap:4px;}
.ibtn{padding:3px 10px;font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit;border:1px solid #e5e5e0;background:transparent;color:#666;}
.ibtn:hover{background:#f0f0ea;}
.ibtn.del:hover{background:#fef2f2;color:#991b1b;border-color:#fecaca;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.modal h2{font-size:17px;font-weight:600;margin-bottom:20px;}
.frow{margin-bottom:14px;}
.frow label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500;}
.frow input{width:100%;padding:9px 12px;border:1px solid #e5e5e0;border-radius:8px;font-size:14px;font-family:inherit;}
.frow input:focus{outline:none;border-color:#1a5fa8;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.hidden{display:none!important;}

/* Bildirim paneli */
.npanel{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.npanel h2{font-size:17px;font-weight:600;margin-bottom:16px;}
.nitem{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0ea;}
.nitem:last-child{border-bottom:none;}
.navt{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;}
.navt.red{background:#fef2f2;color:#991b1b;}
.navt.amber{background:#fffbeb;color:#92400e;}
.nbody{flex:1;}
.nname{font-size:13px;font-weight:600;}
.ndesc{font-size:12px;color:#888;margin-top:2px;}
.ndate{font-size:11px;color:#aaa;margin-top:3px;}
.empty{text-align:center;padding:32px;color:#aaa;font-size:14px;}
.eprev{background:#f9f9f7;border:1px solid #e5e5e0;border-radius:8px;padding:14px;margin-top:14px;font-size:12px;}
.eprev-title{font-weight:600;font-size:13px;color:#1a5fa8;margin-bottom:8px;}
.ediv{border:none;border-top:1px solid #e5e5e0;margin:10px 0;}
.etable{width:100%;border-collapse:collapse;}
.etable th{text-align:left;font-size:11px;color:#888;padding:4px 6px;border-bottom:1px solid #e5e5e0;}
.etable td{padding:4px 6px;font-size:12px;border-bottom:1px solid #f5f5f0;}
.erow{display:flex;gap:8px;margin-bottom:5px;font-size:12px;}
.elabel{color:#aaa;min-width:44px;}
.srow{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap;}
.srow input{flex:1;min-width:180px;padding:8px 12px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;font-family:inherit;}
.sresult{font-size:12px;margin-top:8px;}
</style>
</head>
<body>

<div class="topbar">
  <h1>ISG Takip Sistemi</h1>
  <div class="topbar-btns">
    <button class="btn btn-notif" onclick="openNotif()" id="nbtn">
      Bildirimler
      <span class="ndot hidden" id="ndot">0</span>
    </button>
    <button class="btn btn-primary" onclick="openModal()">+ Yeni Kayıt</button>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-num red" id="s-exp">0</div><div class="stat-label">Süresi Geçmiş</div></div>
    <div class="stat"><div class="stat-num amber" id="s-son">0</div><div class="stat-label">7 Günde Doluyor</div></div>
    <div class="stat"><div class="stat-num green" id="s-ok">0</div><div class="stat-label">Geçerli</div></div>
    <div class="stat"><div class="stat-num" id="s-tot" style="color:#1a1a18">0</div><div class="stat-label">Toplam Kayıt</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('personel')">Personeller</button>
    <button class="tab" onclick="switchTab('firma')">Firmalar</button>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Ad veya numara ara..." oninput="render()"/>
    <select id="flt" onchange="render()">
      <option value="">Tüm durumlar</option>
      <option value="red">Süresi geçmiş</option>
      <option value="amber">7 günde doluyor</option>
      <option value="green">Geçerli</option>
    </select>
  </div>

  <div class="card">
    <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>
</div>

<!-- Kayıt Modal -->
<div class="overlay hidden" id="ov">
  <div class="modal">
    <h2 id="mtitle">Yeni Kayıt Ekle</h2>
    <div id="mbody"></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="save()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Bildirim Paneli -->
<div class="overlay hidden" id="nov">
  <div class="npanel">
    <h2>Bildirimler</h2>
    <div id="nlist"></div>
    <div style="margin-top:16px;border-top:1px solid #f0f0ea;padding-top:16px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;">E-posta Bildirimi Gönder</div>
      <div id="eprev"></div>
      <div class="srow">
        <input type="email" id="email" placeholder="ornek@sirket.com"/>
        <button class="btn btn-primary" onclick="sendMail()">Gönder</button>
      </div>
      <div id="sres" class="sresult"></div>
    </div>
    <div class="mfooter">
      <button class="btn" onclick="closeNotif()">Kapat</button>
    </div>
  </div>
</div>

<script>
const today=new Date();today.setHours(0,0,0,0);
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);};
const fmt=d=>new Date(d).toLocaleDateString('tr-TR');
const diff=d=>Math.floor((new Date(d)-today)/86400000);
const st=d=>{const v=diff(d);return v<0?'red':v<=7?'amber':'green';};
const worst=a=>a.includes('red')?'red':a.includes('amber')?'amber':'green';
const lbl=s=>s==='red'?'Süresi Geçmiş':s==='amber'?'7 Gün İçinde':'Geçerli';

const pCols=[{key:'isg',label:'İş Güv. Eğitimi'},{key:'saglik',label:'Sağlık Raporu'},{key:'ilkyardim',label:'İlk Yardım Eğt.'},{key:'mesleki',label:'Mesleki Yet. Belgesi'}];
const fCols=[{key:'risk',label:'Risk Analizi'},{key:'acil',label:'Acil Durum Planı'},{key:'yangin',label:'Yangın Tatbikatı'}];

let personeller=[
  {id:1,ad:'Ahmet Yılmaz',no:'P001',isg:addD(today,-10),saglik:addD(today,120),ilkyardim:addD(today,200),mesleki:addD(today,5)},
  {id:2,ad:'Fatma Kaya',no:'P002',isg:addD(today,3),saglik:addD(today,-5),ilkyardim:addD(today,15),mesleki:addD(today,300)},
  {id:3,ad:'Mehmet Demir',no:'P003',isg:addD(today,200),saglik:addD(today,250),ilkyardim:addD(today,-20),mesleki:addD(today,180)},
  {id:4,ad:'Zeynep Arslan',no:'P004',isg:addD(today,6),saglik:addD(today,60),ilkyardim:addD(today,400),mesleki:addD(today,-3)},
  {id:5,ad:'Ali Çelik',no:'P005',isg:addD(today,400),saglik:addD(today,-30),ilkyardim:addD(today,90),mesleki:addD(today,2)},
];
let firmalar=[
  {id:6,ad:'ABC İnşaat Ltd.',no:'1234567890',risk:addD(today,-20),acil:addD(today,4),yangin:addD(today,300)},
  {id:7,ad:'XYZ Mühendislik',no:'9876543210',risk:addD(today,180),acil:addD(today,-5),yangin:addD(today,7)},
  {id:8,ad:'Güven Taşımacılık',no:'1122334455',risk:addD(today,90),acil:addD(today,200),yangin:addD(today,-60)},
  {id:9,ad:'Yıldız Kimya A.Ş.',no:'5566778899',risk:addD(today,1),acil:addD(today,400),yangin:addD(today,150)},
];
let nxtId=20,curTab='personel',editId=null;

function getAlerts(){
  const a=[];
  personeller.forEach(p=>pCols.forEach(c=>{const s=st(p[c.key]);if(s!=='green')a.push({type:s,name:p.ad,no:p.no,evrak:c.label,tarih:p[c.key],dif:diff(p[c.key]),cat:'Personel'});}));
  firmalar.forEach(f=>fCols.forEach(c=>{const s=st(f[c.key]);if(s!=='green')a.push({type:s,name:f.ad,no:f.no,evrak:c.label,tarih:f[c.key],dif:diff(f[c.key]),cat:'Firma'});}));
  return a.sort((a,b)=>a.dif-b.dif);
}

function updateBadge(){const n=getAlerts().length;const d=document.getElementById('ndot');if(n>0){d.textContent=n;d.classList.remove('hidden');}else d.classList.add('hidden');}

function switchTab(t){curTab=t;document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',(i===0&&t==='personel')||(i===1&&t==='firma')));document.getElementById('search').value='';document.getElementById('flt').value='';render();}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fs=document.getElementById('flt').value;
  const cols=curTab==='personel'?pCols:fCols;
  const data=curTab==='personel'?personeller:firmalar;
  const idLbl=curTab==='personel'?'Sicil':'VKN';
  let exp=0,son=0,ok=0,tot=0;
  document.getElementById('thead').innerHTML=`<tr><th>${curTab==='personel'?'Ad Soyad':'Firma Adı'}</th><th>${idLbl}</th>${cols.map(c=>`<th>${c.label}</th>`).join('')}<th>Durum</th><th></th></tr>`;
  let rows='';
  data.forEach(r=>{
    const ss=cols.map(c=>st(r[c.key]));
    const ov=worst(ss);
    if(q&&!r.ad.toLowerCase().includes(q)&&!r.no.toLowerCase().includes(q))return;
    if(fs&&ov!==fs)return;
    tot++;if(ov==='red')exp++;else if(ov==='amber')son++;else ok++;
    rows+=`<tr><td style="font-weight:600">${r.ad}</td><td style="color:#aaa;font-size:11px">${r.no}</td>${cols.map((c,i)=>`<td><span class="badge badge-${ss[i]}">${fmt(r[c.key])}</span></td>`).join('')}<td><span class="badge badge-${ov}">${lbl(ov)}</span></td><td><div class="ibtns"><button class="ibtn" onclick="openModal(${r.id})">Düzenle</button><button class="ibtn del" onclick="del(${r.id})">Sil</button></div></td></tr>`;
  });
  document.getElementById('tbody').innerHTML=rows||`<tr><td colspan="${cols.length+4}" class="empty">Kayıt bulunamadı</td></tr>`;
  document.getElementById('s-exp').textContent=exp;
  document.getElementById('s-son').textContent=son;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-tot').textContent=tot;
  updateBadge();
}

function openModal(id){
  editId=id||null;
  const cols=curTab==='personel'?pCols:fCols;
  const data=curTab==='personel'?personeller:firmalar;
  const rec=id?data.find(r=>r.id===id):null;
  document.getElementById('mtitle').textContent=id?'Kaydı Düzenle':'Yeni Kayıt Ekle';
  let h='<div class="fgrid">';
  if(curTab==='personel'){
    h+=`<div class="frow" style="grid-column:1/-1"><label>Ad Soyad</label><input id="f-ad" type="text" value="${rec?rec.ad:''}" placeholder="Personel adı"/></div>`;
    h+=`<div class="frow"><label>Sicil No</label><input id="f-no" type="text" value="${rec?rec.no:''}" placeholder="P001"/></div>`;
  }else{
    h+=`<div class="frow" style="grid-column:1/-1"><label>Firma Adı</label><input id="f-ad" type="text" value="${rec?rec.ad:''}" placeholder="Firma adı"/></div>`;
    h+=`<div class="frow"><label>VKN</label><input id="f-no" type="text" value="${rec?rec.no:''}" placeholder="Vergi kimlik no"/></div>`;
  }
  h+=`</div><div class="fgrid">`;
  cols.forEach(c=>{h+=`<div class="frow"><label>${c.label}</label><input id="f-${c.key}" type="date" value="${rec?rec[c.key]:''}"/></div>`;});
  h+='</div>';
  document.getElementById('mbody').innerHTML=h;
  document.getElementById('ov').classList.remove('hidden');
}
function closeModal(){document.getElementById('ov').classList.add('hidden');editId=null;}

function save(){
  const cols=curTab==='personel'?pCols:fCols;
  const ad=document.getElementById('f-ad').value.trim();
  if(!ad){alert('Ad alanı zorunlu!');return;}
  const rec={id:editId||nxtId++,ad,no:document.getElementById('f-no').value.trim()||'—'};
  cols.forEach(c=>{rec[c.key]=document.getElementById('f-'+c.key).value||today.toISOString().slice(0,10);});
  if(curTab==='personel'){if(editId){const i=personeller.findIndex(r=>r.id===editId);personeller[i]=rec;}else personeller.push(rec);}
  else{if(editId){const i=firmalar.findIndex(r=>r.id===editId);firmalar[i]=rec;}else firmalar.push(rec);}
  closeModal();render();
}

function del(id){
  if(!confirm('Bu kaydı silmek istediğinizden emin misiniz?'))return;
  if(curTab==='personel')personeller=personeller.filter(r=>r.id!==id);
  else firmalar=firmalar.filter(r=>r.id!==id);
  render();
}

function openNotif(){
  const alerts=getAlerts();
  let h='';
  if(!alerts.length){h='<div class="empty">Tüm evraklar geçerli, bildirim yok.</div>';}
  else{alerts.forEach(a=>{const ini=a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();const desc=a.dif<0?`${Math.abs(a.dif)} gün önce sona erdi`:`${a.dif} gün içinde sona erecek`;h+=`<div class="nitem"><div class="navt ${a.type}">${ini}</div><div class="nbody"><div class="nname">${a.name} <span style="font-weight:400;color:#aaa;font-size:11px">(${a.cat} · ${a.no})</span></div><div class="ndesc">${a.evrak}</div><div class="ndate">${fmt(a.tarih)} · ${desc}</div></div><span class="badge badge-${a.type}">${a.type==='red'?'Geçmiş':'7 Gün'}</span></div>`;});}
  document.getElementById('nlist').innerHTML=h;
  const reds=alerts.filter(a=>a.type==='red');
  const ambs=alerts.filter(a=>a.type==='amber');
  let ep=`<div class="eprev"><div class="eprev-title">E-posta Önizlemesi</div><div class="erow"><span class="elabel">Konu:</span><span>ISG Takip — Evrak Uyarısı (${new Date().toLocaleDateString('tr-TR')})</span></div><hr class="ediv">`;
  if(reds.length){ep+=`<div style="font-size:12px;font-weight:600;color:#991b1b;margin-bottom:6px">Süresi Geçmiş (${reds.length})</div><table class="etable"><tr><th>Ad/Firma</th><th>Evrak</th><th>Son Tarih</th></tr>`;reds.forEach(a=>{ep+=`<tr><td>${a.name}</td><td>${a.evrak}</td><td style="color:#991b1b;font-weight:600">${fmt(a.tarih)}</td></tr>`;});ep+='</table>';}
  if(ambs.length){ep+=`<div style="font-size:12px;font-weight:600;color:#92400e;margin:10px 0 6px">7 Gün İçinde Dolacak (${ambs.length})</div><table class="etable"><tr><th>Ad/Firma</th><th>Evrak</th><th>Son Tarih</th></tr>`;ambs.forEach(a=>{ep+=`<tr><td>${a.name}</td><td>${a.evrak}</td><td style="color:#92400e;font-weight:600">${fmt(a.tarih)}</td></tr>`;});ep+='</table>';}
  ep+=`<div style="margin-top:10px;font-size:11px;color:#aaa;">ISG Takip Sistemi — Otomatik bildirim</div></div>`;
  document.getElementById('eprev').innerHTML=ep;
  document.getElementById('sres').textContent='';
  document.getElementById('nov').classList.remove('hidden');
}
function closeNotif(){document.getElementById('nov').classList.add('hidden');}
function sendMail(){
  const em=document.getElementById('email').value.trim();
  const r=document.getElementById('sres');
  if(!em||!em.includes('@')){r.style.color='#dc2626';r.textContent='Geçerli bir e-posta adresi girin.';return;}
  r.style.color='#16a34a';r.textContent=`"${em}" adresine bildirim gönderildi. (Gerçek e-posta için Resend entegrasyonu gerekir — Adım 4'te yapacağız.)`;
}
render();
</script>
</body>
</html>
