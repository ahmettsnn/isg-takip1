<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISG Takip Sistemi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
a{text-decoration:none;color:inherit;}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar h1{font-size:16px;font-weight:700;color:#1a1a18;}
.breadcrumb{font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px;}
.breadcrumb span{cursor:pointer;color:#1a5fa8;}
.breadcrumb span:hover{text-decoration:underline;}
.topbar-btns{display:flex;gap:8px;}

/* BUTTONS */
.btn{padding:7px 14px;font-size:13px;cursor:pointer;border-radius:8px;font-family:inherit;border:1px solid #e5e5e0;background:#fff;color:#1a1a18;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:#f0f0ea;}
.btn-primary{background:#1a5fa8;color:#fff;border-color:#1a5fa8;}
.btn-primary:hover{background:#154d8a;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-notif{position:relative;}
.ndot{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:#dc2626;border-radius:50%;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}

/* CONTAINER */
.container{max-width:1100px;margin:0 auto;padding:20px 16px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-size:24px;font-weight:700;}
.stat-label{font-size:11px;color:#888;margin-top:3px;}
.c-red{color:#dc2626;}.c-amber{color:#d97706;}.c-green{color:#16a34a;}.c-blue{color:#1a5fa8;}

/* CARDS / TABLE */
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 16px;border-bottom:1px solid #f0f0ea;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:15px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 12px;color:#888;font-weight:600;border-bottom:1px solid #e5e5e0;font-size:11px;white-space:nowrap;background:#fafaf8;}
tbody tr{border-bottom:1px solid #f0f0ea;cursor:pointer;}
tbody tr:hover{background:#fafaf8;}
tbody td{padding:10px 12px;white-space:nowrap;}
.ibtns{display:flex;gap:4px;}
.ibtn{padding:3px 9px;font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit;border:1px solid #e5e5e0;background:transparent;color:#666;}
.ibtn:hover{background:#f0f0ea;}
.ibtn.del:hover{background:#fef2f2;color:#991b1b;border-color:#fecaca;}

/* BADGE */
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-red{background:#fef2f2;color:#991b1b;}
.badge-amber{background:#fffbeb;color:#92400e;}
.badge-green{background:#f0fdf4;color:#166534;}
.badge-blue{background:#eff6ff;color:#1e40af;}
.badge-gray{background:#f3f4f6;color:#4b5563;}

/* TEHLIKE SINIFI */
.ts-az{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
.ts-teh{background:#fffbeb;color:#92400e;border:1px solid #fde68a;}
.ts-cok{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.toolbar input,.toolbar select{flex:1;min-width:150px;padding:8px 12px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;}

/* TABS (firma içi) */
.inner-tabs{display:flex;gap:0;border-bottom:2px solid #f0f0ea;margin-bottom:20px;}
.itab{padding:10px 20px;font-size:14px;cursor:pointer;background:transparent;border:none;color:#888;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;}
.itab.active{color:#1a5fa8;border-bottom-color:#1a5fa8;font-weight:600;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px;}
.info-item label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:4px;}
.info-item .val{font-size:14px;font-weight:500;}
.info-edit input,.info-edit select{width:100%;padding:7px 10px;border:1px solid #e5e5e0;border-radius:7px;font-size:13px;font-family:inherit;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.modal h2{font-size:17px;font-weight:600;margin-bottom:18px;}
.frow{margin-bottom:13px;}
.frow label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500;}
.frow input,.frow select{width:100%;padding:8px 11px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;font-family:inherit;}
.frow input:focus,.frow select:focus{outline:none;border-color:#1a5fa8;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.hidden{display:none!important;}
.section-title{font-size:13px;font-weight:600;color:#888;margin:16px 0 10px;text-transform:uppercase;letter-spacing:.5px;}

/* BİLDİRİM */
.npanel{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.npanel h2{font-size:17px;font-weight:600;margin-bottom:14px;}
.nitem{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0ea;}
.nitem:last-child{border-bottom:none;}
.navt{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;}
.navt.red{background:#fef2f2;color:#991b1b;}
.navt.amber{background:#fffbeb;color:#92400e;}
.nbody{flex:1;}
.nname{font-size:13px;font-weight:600;}
.ndesc{font-size:12px;color:#888;margin-top:2px;}
.ndate{font-size:11px;color:#bbb;margin-top:2px;}
.empty-state{text-align:center;padding:40px 20px;color:#aaa;}
.empty-state .big{font-size:32px;margin-bottom:8px;}
.empty-state p{font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>ISG Takip</h1>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="topbar-btns">
    <button class="btn btn-notif" onclick="openNotif()" id="nbtn">
      Bildirimler
      <span class="ndot hidden" id="ndot">0</span>
    </button>
    <button class="btn btn-primary" id="add-btn" onclick="handleAdd()">+ Ekle</button>
  </div>
</div>

<div class="container" id="main"></div>

<!-- MODAL -->
<div class="overlay hidden" id="ov">
  <div class="modal">
    <h2 id="mtitle"></h2>
    <div id="mbody"></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="save()">Kaydet</button>
    </div>
  </div>
</div>

<!-- BİLDİRİM PANELİ -->
<div class="overlay hidden" id="nov">
  <div class="npanel">
    <h2>Bildirimler <span id="notif-count" style="font-size:13px;font-weight:400;color:#aaa"></span></h2>
    <div id="nlist"></div>
    <div class="mfooter"><button class="btn" onclick="document.getElementById('nov').classList.add('hidden')">Kapat</button></div>
  </div>
</div>

<script>
// ===================== VERİ YAPISI =====================
const SURELER = {
  'az': {
    isg: 3*365, saglik: 5*365, ilkyardim: 3*365, mesleki: 5*365,
    risk: 5*365, acil: 4*365, yangin: 365, sgk: 90, vergi: 90
  },
  'teh': {
    isg: 2*365, saglik: 3*365, ilkyardim: 3*365, mesleki: 5*365,
    risk: 4*365, acil: 4*365, yangin: 365, sgk: 90, vergi: 90
  },
  'cok': {
    isg: 365, saglik: 365, ilkyardim: 3*365, mesleki: 5*365,
    risk: 2*365, acil: 2*365, yangin: 365, sgk: 90, vergi: 90
  }
};
const TS_LABEL = {az:'Az Tehlikeli', teh:'Tehlikeli', cok:'Çok Tehlikeli'};
const TS_CLASS = {az:'ts-az', teh:'ts-teh', cok:'ts-cok'};

const today = new Date(); today.setHours(0,0,0,0);
const addD = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r.toISOString().slice(0,10); };
const fmt = d => d ? new Date(d).toLocaleDateString('tr-TR') : '—';
const diff = d => d ? Math.floor((new Date(d)-today)/86400000) : 9999;
const st = d => { if(!d) return 'green'; const v=diff(d); return v<0?'red':v<=30?'amber':'green'; };
const worst = a => a.includes('red')?'red':a.includes('amber')?'amber':'green';
const lbl = s => s==='red'?'Süresi Geçmiş':s==='amber'?'30 Gün İçinde':'Geçerli';
const uid = () => Date.now() + Math.random().toString(36).slice(2,6);

// DEMO VERİLER
let firmalar = [
  {id:'f1', ad:'ABC İnşaat Ltd.', nace:'4120', ts:'cok', vergi:'1234567890', sgk:'123456', adres:'İstanbul / Kadıköy',
   belgeler:{risk:addD(today,-20), acil:addD(today,25), yangin:addD(today,300), sgk:addD(today,60), vergi:addD(today,45)}},
  {id:'f2', ad:'XYZ Büro Hizmetleri', nace:'8211', ts:'az', vergi:'9876543210', sgk:'654321', adres:'Ankara / Çankaya',
   belgeler:{risk:addD(today,180), acil:addD(today,200), yangin:addD(today,10), sgk:addD(today,80), vergi:addD(today,20)}},
  {id:'f3', ad:'Güven Kimya A.Ş.', nace:'2011', ts:'cok', vergi:'1122334455', sgk:'112233', adres:'İzmir / Bornova',
   belgeler:{risk:addD(today,90), acil:addD(today,-5), yangin:addD(today,-60), sgk:addD(today,30), vergi:addD(today,55)}},
  {id:'f4', ad:'Yıldız Market Zinciri', nace:'4711', ts:'teh', vergi:'5566778899', sgk:'556677', adres:'Bursa / Nilüfer',
   belgeler:{risk:addD(today,400), acil:addD(today,350), yangin:addD(today,5), sgk:addD(today,70), vergi:addD(today,40)}},
];

let personeller = [
  {id:'p1',fid:'f1',ad:'Ahmet Yılmaz',sicil:'P001',gorev:'Saha İşçisi',belgeler:{isg:addD(today,-10),saglik:addD(today,120),ilkyardim:addD(today,200),mesleki:addD(today,25)}},
  {id:'p2',fid:'f1',ad:'Fatma Kaya',sicil:'P002',gorev:'Kalıpçı',belgeler:{isg:addD(today,20),saglik:addD(today,-5),ilkyardim:addD(today,15),mesleki:addD(today,300)}},
  {id:'p3',fid:'f1',ad:'Mehmet Demir',sicil:'P003',gorev:'Foreman',belgeler:{isg:addD(today,200),saglik:addD(today,250),ilkyardim:addD(today,-20),mesleki:addD(today,180)}},
  {id:'p4',fid:'f2',ad:'Zeynep Arslan',sicil:'P004',gorev:'Muhasebeci',belgeler:{isg:addD(today,400),saglik:addD(today,600),ilkyardim:addD(today,400),mesleki:addD(today,500)}},
  {id:'p5',fid:'f2',ad:'Ali Çelik',sicil:'P005',gorev:'Sekreter',belgeler:{isg:addD(today,350),saglik:addD(today,400),ilkyardim:addD(today,300),mesleki:addD(today,450)}},
  {id:'p6',fid:'f3',ad:'Ayşe Şahin',sicil:'P006',gorev:'Kimyager',belgeler:{isg:addD(today,-5),saglik:addD(today,30),ilkyardim:addD(today,5),mesleki:addD(today,-10)}},
  {id:'p7',fid:'f3',ad:'Murat Öztürk',sicil:'P007',gorev:'Teknisyen',belgeler:{isg:addD(today,10),saglik:addD(today,-20),ilkyardim:addD(today,200),mesleki:addD(today,100)}},
  {id:'p8',fid:'f4',ad:'Elif Yıldız',sicil:'P008',gorev:'Kasiyer',belgeler:{isg:addD(today,180),saglik:addD(today,200),ilkyardim:addD(today,150),mesleki:addD(today,400)}},
];

// UYGULAMA DURUMU
let curView = 'home'; // home | firma
let curFirmaId = null;
let curTab = 'belgeler'; // belgeler | personeller | bilgiler
let editId = null;
let editType = null;

// ===================== RENDER =====================
function render() {
  if (curView === 'home') renderHome();
  else renderFirma();
}

function renderHome() {
  updateBreadcrumb([]);
  document.getElementById('add-btn').textContent = '+ Firma Ekle';

  const stats = calcGlobalStats();
  let h = `<div class="stats">
    <div class="stat"><div class="stat-num c-red">${stats.exp}</div><div class="stat-label">Süresi Geçmiş</div></div>
    <div class="stat"><div class="stat-num c-amber">${stats.son}</div><div class="stat-label">30 Günde Doluyor</div></div>
    <div class="stat"><div class="stat-num c-green">${stats.ok}</div><div class="stat-label">Geçerli</div></div>
    <div class="stat"><div class="stat-num c-blue">${firmalar.length}</div><div class="stat-label">İşyeri</div></div>
    <div class="stat"><div class="stat-num" style="color:#1a1a18">${personeller.length}</div><div class="stat-label">Personel</div></div>
  </div>`;

  h += `<div class="card">
    <div class="card-header"><span class="card-title">İşyerleri</span></div>
    <table>
      <thead><tr><th>İşyeri Adı</th><th>NACE Kodu</th><th>Tehlike Sınıfı</th><th>Personel</th><th>Belge Durumu</th><th></th></tr></thead>
      <tbody>`;
  
  firmalar.forEach(f => {
    const pCount = personeller.filter(p=>p.fid===f.id).length;
    const bSt = firmaStatus(f);
    h += `<tr onclick="goFirma('${f.id}')">
      <td style="font-weight:600">${f.ad}</td>
      <td style="color:#888">${f.nace||'—'}</td>
      <td><span class="badge ${TS_CLASS[f.ts]}">${TS_LABEL[f.ts]}</span></td>
      <td>${pCount} kişi</td>
      <td><span class="badge badge-${bSt}">${lbl(bSt)}</span></td>
      <td onclick="event.stopPropagation()"><div class="ibtns">
        <button class="ibtn" onclick="openFirmaEdit('${f.id}')">Düzenle</button>
        <button class="ibtn del" onclick="delFirma('${f.id}')">Sil</button>
      </div></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  document.getElementById('main').innerHTML = h;
  updateBadge();
}

function renderFirma() {
  const f = firmalar.find(x=>x.id===curFirmaId);
  if (!f) { goHome(); return; }
  updateBreadcrumb([{label: f.ad}]);

  let h = `<div class="inner-tabs">
    <button class="itab ${curTab==='bilgiler'?'active':''}" onclick="switchTab('bilgiler')">Firma Bilgileri</button>
    <button class="itab ${curTab==='belgeler'?'active':''}" onclick="switchTab('belgeler')">Firma Belgeleri</button>
    <button class="itab ${curTab==='personeller'?'active':''}" onclick="switchTab('personeller')">Personeller</button>
  </div>`;

  if (curTab === 'bilgiler') h += renderBilgiler(f);
  else if (curTab === 'belgeler') h += renderFirmaBelgeler(f);
  else h += renderPersoneller(f);

  document.getElementById('main').innerHTML = h;
  updateBadge();
}

function renderBilgiler(f) {
  document.getElementById('add-btn').textContent = '✎ Bilgileri Düzenle';
  return `<div class="card" style="padding:20px">
    <div class="stats" style="margin-bottom:0">
      <div class="info-item"><label>Firma Adı</label><div class="val">${f.ad}</div></div>
      <div class="info-item"><label>Tehlike Sınıfı</label><div class="val"><span class="badge ${TS_CLASS[f.ts]}">${TS_LABEL[f.ts]}</span></div></div>
      <div class="info-item"><label>NACE Kodu</label><div class="val">${f.nace||'—'}</div></div>
      <div class="info-item"><label>Vergi Kimlik No</label><div class="val">${f.vergi||'—'}</div></div>
      <div class="info-item"><label>SGK Sicil No</label><div class="val">${f.sgk||'—'}</div></div>
      <div class="info-item"><label>Adres</label><div class="val">${f.adres||'—'}</div></div>
    </div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f0f0ea;">
      <div class="section-title">Tehlike sınıfına göre geçerlilik süreleri</div>
      <table style="font-size:12px;">
        <thead><tr><th>Evrak</th><th>Bu İşyeri İçin Süre</th></tr></thead>
        <tbody>
          <tr><td>ISG Eğitimi</td><td>${SURELER[f.ts].isg/365} yılda bir</td></tr>
          <tr><td>Sağlık Raporu</td><td>${SURELER[f.ts].saglik/365} yılda bir</td></tr>
          <tr><td>İlk Yardım Eğitimi</td><td>${SURELER[f.ts].ilkyardim/365} yılda bir</td></tr>
          <tr><td>Risk Analizi</td><td>${SURELER[f.ts].risk/365} yılda bir</td></tr>
          <tr><td>Acil Durum Planı</td><td>${SURELER[f.ts].acil/365} yılda bir</td></tr>
          <tr><td>Yangın Tatbikatı</td><td>${SURELER[f.ts].yangin/365} yılda bir</td></tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderFirmaBelgeler(f) {
  document.getElementById('add-btn').textContent = '+ Belge Ekle';
  const bCols = [
    {key:'risk', label:'Risk Analizi'},
    {key:'acil', label:'Acil Durum Planı'},
    {key:'yangin', label:'Yangın Tatbikatı'},
    {key:'sgk', label:'SGK Borcu Yoktur'},
    {key:'vergi', label:'Vergi Borcu Yoktur'},
  ];
  let h = `<div class="card"><table>
    <thead><tr><th>Belge</th><th>Son Geçerlilik</th><th>Durum</th><th>Kalan Süre</th></tr></thead>
    <tbody>`;
  bCols.forEach(c => {
    const tarih = f.belgeler[c.key];
    const s = st(tarih);
    const d = diff(tarih);
    const kalanStr = !tarih ? '—' : d < 0 ? `${Math.abs(d)} gün geçti` : `${d} gün kaldı`;
    h += `<tr>
      <td style="font-weight:500">${c.label}</td>
      <td>${fmt(tarih)}</td>
      <td><span class="badge badge-${s}">${lbl(s)}</span></td>
      <td style="color:${s==='red'?'#dc2626':s==='amber'?'#d97706':'#16a34a'};font-weight:500">${kalanStr}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function renderPersoneller(f) {
  document.getElementById('add-btn').textContent = '+ Personel Ekle';
  const ps = personeller.filter(p=>p.fid===f.id);
  const pCols = [
    {key:'isg',label:'İSG Eğitimi'},
    {key:'saglik',label:'Sağlık Rap.'},
    {key:'ilkyardim',label:'İlk Yardım'},
    {key:'mesleki',label:'Mesleki Yet.'},
  ];

  if (!ps.length) return `<div class="card"><div class="empty-state"><div class="big">👤</div><p>Bu işyerinde henüz personel yok.</p><br><button class="btn btn-primary" onclick="openPersonelModal()">+ İlk Personeli Ekle</button></div></div>`;

  let h = `<div class="card"><table>
    <thead><tr><th>Ad Soyad</th><th>Sicil</th><th>Görev</th>${pCols.map(c=>`<th>${c.label}</th>`).join('')}<th>Durum</th><th></th></tr></thead>
    <tbody>`;
  ps.forEach(p => {
    const ss = pCols.map(c => st(p.belgeler[c.key]));
    const ov = worst(ss);
    h += `<tr>
      <td style="font-weight:600">${p.ad}</td>
      <td style="color:#aaa;font-size:11px">${p.sicil}</td>
      <td style="color:#888">${p.gorev||'—'}</td>
      ${pCols.map((c,i)=>{
        const d=diff(p.belgeler[c.key]);
        const yeniTarih = p.belgeler[c.key] ? addD(p.belgeler[c.key], SURELER[f.ts][c.key]) : null;
        return `<td title="Yenileme: ${fmt(yeniTarih)}"><span class="badge badge-${ss[i]}">${fmt(p.belgeler[c.key])}</span></td>`;
      }).join('')}
      <td><span class="badge badge-${ov}">${lbl(ov)}</span></td>
      <td><div class="ibtns">
        <button class="ibtn" onclick="openPersonelEdit('${p.id}')">Düzenle</button>
        <button class="ibtn del" onclick="delPersonel('${p.id}')">Sil</button>
      </div></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

// ===================== NAVİGASYON =====================
function goHome() { curView='home'; curFirmaId=null; render(); }
function goFirma(id) { curView='firma'; curFirmaId=id; curTab='belgeler'; render(); }
function switchTab(t) { curTab=t; render(); }
function updateBreadcrumb(items) {
  let h = '';
  if (items.length) {
    h = `<span onclick="goHome()">İşyerleri</span> / <span style="color:#1a1a18;cursor:default">${items[0].label}</span>`;
  }
  document.getElementById('breadcrumb').innerHTML = h;
}

// ===================== STATS =====================
function firmaStatus(f) {
  const bKeys = ['risk','acil','yangin','sgk','vergi'];
  return worst(bKeys.map(k=>st(f.belgeler[k])));
}
function calcGlobalStats() {
  let exp=0,son=0,ok=0;
  firmalar.forEach(f=>{
    ['risk','acil','yangin','sgk','vergi'].forEach(k=>{const s=st(f.belgeler[k]);if(s==='red')exp++;else if(s==='amber')son++;else ok++;});
  });
  personeller.forEach(p=>{
    ['isg','saglik','ilkyardim','mesleki'].forEach(k=>{const s=st(p.belgeler[k]);if(s==='red')exp++;else if(s==='amber')son++;else ok++;});
  });
  return {exp,son,ok};
}

// ===================== BİLDİRİM =====================
function getAlerts() {
  const a=[];
  firmalar.forEach(f=>{
    ['risk','acil','yangin','sgk','vergi'].forEach(k=>{
      const s=st(f.belgeler[k]);
      if(s!=='green') a.push({type:s,name:f.ad,cat:'Firma',evrak:k,tarih:f.belgeler[k],dif:diff(f.belgeler[k])});
    });
  });
  personeller.forEach(p=>{
    const f=firmalar.find(x=>x.id===p.fid);
    ['isg','saglik','ilkyardim','mesleki'].forEach(k=>{
      const s=st(p.belgeler[k]);
      if(s!=='green') a.push({type:s,name:p.ad,cat:'Personel',sub:f?f.ad:'',evrak:k,tarih:p.belgeler[k],dif:diff(p.belgeler[k])});
    });
  });
  return a.sort((a,b)=>a.dif-b.dif);
}
const evrakAd={risk:'Risk Analizi',acil:'Acil Durum Planı',yangin:'Yangın Tatbikatı',sgk:'SGK Borcu Yoktur',vergi:'Vergi Borcu Yoktur',isg:'İSG Eğitimi',saglik:'Sağlık Raporu',ilkyardim:'İlk Yardım Eğitimi',mesleki:'Mesleki Yeterlilik'};
function updateBadge(){const n=getAlerts().length;const d=document.getElementById('ndot');if(n>0){d.textContent=n;d.classList.remove('hidden');}else d.classList.add('hidden');}
function openNotif(){
  const alerts=getAlerts();
  document.getElementById('notif-count').textContent=alerts.length?`(${alerts.length} uyarı)`:'';
  let h='';
  if(!alerts.length) h='<div style="text-align:center;padding:24px;color:#aaa">Tüm evraklar geçerli!</div>';
  else alerts.forEach(a=>{
    const ini=a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const desc=a.dif<0?`${Math.abs(a.dif)} gün önce sona erdi`:`${a.dif} gün içinde sona erecek`;
    h+=`<div class="nitem"><div class="navt ${a.type}">${ini}</div><div class="nbody">
      <div class="nname">${a.name} <span style="font-weight:400;color:#aaa;font-size:11px">${a.sub?'('+a.sub+')':''}</span></div>
      <div class="ndesc">${evrakAd[a.evrak]||a.evrak} · ${a.cat}</div>
      <div class="ndate">${fmt(a.tarih)} · ${desc}</div>
    </div><span class="badge badge-${a.type}">${a.type==='red'?'Geçmiş':'Yakın'}</span></div>`;
  });
  document.getElementById('nlist').innerHTML=h;
  document.getElementById('nov').classList.remove('hidden');
}

// ===================== MODAL - FİRMA =====================
function handleAdd() {
  if (curView==='home') openFirmaModal();
  else if (curTab==='personeller') openPersonelModal();
  else if (curTab==='belgeler') openBelgeModal();
  else openFirmaEdit(curFirmaId);
}
function openFirmaModal(id) {
  editId=id||null; editType='firma';
  const f=id?firmalar.find(x=>x.id===id):null;
  document.getElementById('mtitle').textContent=id?'Firma Düzenle':'Yeni Firma Ekle';
  document.getElementById('mbody').innerHTML=`
    <div class="frow"><label>Firma Adı</label><input id="f-ad" type="text" value="${f?f.ad:''}" placeholder="Firma adı"/></div>
    <div class="fgrid">
      <div class="frow"><label>Tehlike Sınıfı</label><select id="f-ts">
        <option value="az" ${f&&f.ts==='az'?'selected':''}>Az Tehlikeli</option>
        <option value="teh" ${f&&f.ts==='teh'?'selected':''}>Tehlikeli</option>
        <option value="cok" ${(!f||f.ts==='cok')?'selected':''}>Çok Tehlikeli</option>
      </select></div>
      <div class="frow"><label>NACE Kodu</label><input id="f-nace" type="text" value="${f?f.nace:''}" placeholder="4120"/></div>
      <div class="frow"><label>Vergi Kimlik No</label><input id="f-vergi" type="text" value="${f?f.vergi:''}" placeholder="1234567890"/></div>
      <div class="frow"><label>SGK Sicil No</label><input id="f-sgk" type="text" value="${f?f.sgk:''}" placeholder="123456"/></div>
    </div>
    <div class="frow"><label>Adres</label><input id="f-adres" type="text" value="${f?f.adres:''}" placeholder="İl / İlçe"/></div>`;
  document.getElementById('ov').classList.remove('hidden');
}
function openFirmaEdit(id){openFirmaModal(id);}

// ===================== MODAL - PERSONEL =====================
function openPersonelModal(id) {
  editId=id||null; editType='personel';
  const p=id?personeller.find(x=>x.id===id):null;
  const f=firmalar.find(x=>x.id===curFirmaId);
  document.getElementById('mtitle').textContent=id?'Personel Düzenle':'Yeni Personel Ekle';
  document.getElementById('mbody').innerHTML=`
    <div class="fgrid">
      <div class="frow" style="grid-column:1/-1"><label>Ad Soyad</label><input id="p-ad" type="text" value="${p?p.ad:''}" placeholder="Personel adı"/></div>
      <div class="frow"><label>Sicil No</label><input id="p-sicil" type="text" value="${p?p.sicil:''}" placeholder="P001"/></div>
      <div class="frow"><label>Görevi</label><input id="p-gorev" type="text" value="${p?p.gorev:''}" placeholder="Operatör"/></div>
    </div>
    <div class="section-title">Belge Tarihleri <span style="font-weight:400;font-size:11px;color:#aaa">(Son geçerlilik tarihi girin)</span></div>
    <div class="fgrid">
      <div class="frow"><label>İSG Eğitimi ${f?'('+SURELER[f.ts].isg/365+' yılda bir)':''}</label><input id="p-isg" type="date" value="${p?p.belgeler.isg:''}"/></div>
      <div class="frow"><label>Sağlık Raporu ${f?'('+SURELER[f.ts].saglik/365+' yılda bir)':''}</label><input id="p-saglik" type="date" value="${p?p.belgeler.saglik:''}"/></div>
      <div class="frow"><label>İlk Yardım Eğitimi</label><input id="p-ilkyardim" type="date" value="${p?p.belgeler.ilkyardim:''}"/></div>
      <div class="frow"><label>Mesleki Yeterlilik</label><input id="p-mesleki" type="date" value="${p?p.belgeler.mesleki:''}"/></div>
    </div>`;
  document.getElementById('ov').classList.remove('hidden');
}
function openPersonelEdit(id){openPersonelModal(id);}

// ===================== MODAL - BELGE =====================
function openBelgeModal() {
  editId=curFirmaId; editType='belge';
  const f=firmalar.find(x=>x.id===curFirmaId);
  document.getElementById('mtitle').textContent='Firma Belgelerini Güncelle';
  document.getElementById('mbody').innerHTML=`
    <div class="fgrid">
      <div class="frow"><label>Risk Analizi ${f?'('+SURELER[f.ts].risk/365+' yılda bir)':''}</label><input id="b-risk" type="date" value="${f.belgeler.risk||''}"/></div>
      <div class="frow"><label>Acil Durum Planı ${f?'('+SURELER[f.ts].acil/365+' yılda bir)':''}</label><input id="b-acil" type="date" value="${f.belgeler.acil||''}"/></div>
      <div class="frow"><label>Yangın Tatbikatı (1 yılda bir)</label><input id="b-yangin" type="date" value="${f.belgeler.yangin||''}"/></div>
      <div class="frow"><label>SGK Borcu Yoktur</label><input id="b-sgk" type="date" value="${f.belgeler.sgk||''}"/></div>
      <div class="frow"><label>Vergi Borcu Yoktur</label><input id="b-vergi" type="date" value="${f.belgeler.vergi||''}"/></div>
    </div>`;
  document.getElementById('ov').classList.remove('hidden');
}

// ===================== KAYDET =====================
function closeModal(){document.getElementById('ov').classList.add('hidden');editId=null;editType=null;}
function save(){
  if(editType==='firma') saveFirma();
  else if(editType==='personel') savePersonel();
  else if(editType==='belge') saveBelge();
}
function saveFirma(){
  const ad=document.getElementById('f-ad').value.trim();
  if(!ad){alert('Firma adı zorunlu!');return;}
  const rec={
    id:editId||uid(), ad,
    ts:document.getElementById('f-ts').value,
    nace:document.getElementById('f-nace').value.trim(),
    vergi:document.getElementById('f-vergi').value.trim(),
    sgk:document.getElementById('f-sgk').value.trim(),
    adres:document.getElementById('f-adres').value.trim(),
    belgeler:editId?(firmalar.find(x=>x.id===editId)||{belgeler:{}}).belgeler:{}
  };
  if(editId){const i=firmalar.findIndex(x=>x.id===editId);firmalar[i]=rec;}
  else firmalar.push(rec);
  closeModal();render();
}
function savePersonel(){
  const ad=document.getElementById('p-ad').value.trim();
  if(!ad){alert('Ad Soyad zorunlu!');return;}
  const rec={
    id:editId||uid(), fid:curFirmaId, ad,
    sicil:document.getElementById('p-sicil').value.trim(),
    gorev:document.getElementById('p-gorev').value.trim(),
    belgeler:{
      isg:document.getElementById('p-isg').value||'',
      saglik:document.getElementById('p-saglik').value||'',
      ilkyardim:document.getElementById('p-ilkyardim').value||'',
      mesleki:document.getElementById('p-mesleki').value||'',
    }
  };
  if(editId){const i=personeller.findIndex(x=>x.id===editId);personeller[i]=rec;}
  else personeller.push(rec);
  closeModal();render();
}
function saveBelge(){
  const f=firmalar.find(x=>x.id===editId);
  if(!f)return;
  f.belgeler.risk=document.getElementById('b-risk').value;
  f.belgeler.acil=document.getElementById('b-acil').value;
  f.belgeler.yangin=document.getElementById('b-yangin').value;
  f.belgeler.sgk=document.getElementById('b-sgk').value;
  f.belgeler.vergi=document.getElementById('b-vergi').value;
  closeModal();render();
}

// ===================== SİL =====================
function delFirma(id){
  if(!confirm('Bu firmayı ve tüm personellerini silmek istediğinizden emin misiniz?'))return;
  firmalar=firmalar.filter(x=>x.id!==id);
  personeller=personeller.filter(x=>x.fid!==id);
  render();
}
function delPersonel(id){
  if(!confirm('Bu personeli silmek istediğinizden emin misiniz?'))return;
  personeller=personeller.filter(x=>x.id!==id);
  render();
}

render();
</script>
