const persIsgBitis=p=>{const f=firmalar.find(x=>x.id===p.fid);return(f&&p.isg_tarih)?addD(p.isg_tarih,SURELER[f.ts].isg_egitim):'';};
const persSaglikBitis=p=>{const f=firmalar.find(x=>x.id===p.fid);return(f&&p.saglik_tarih)?addD(p.saglik_tarih,SURELER[f.ts].saglik):'';};
const ekipBitis=e=>e.sonBakim&&e.periyot?addD(e.sonBakim,e.periyot):'';
function avatarHtml(p,size='sm'){const cls=size==='lg'?'avatar-lg':'avatar';if(p.foto)return`<div class="${cls}"><img src="${p.foto}"/></div>`;return`<div class="${cls}">${ini(p.ad)}</div>`;}
function ekipmanFotoHtml(e){if(e.fotolar&&e.fotolar.length)return`<div class="ekipman-foto"><img src="${e.fotolar[0]}"/></div>`;return`<div class="ekipman-foto">⚙</div>`;}
function fileIcon(tip){return tip==='pdf'?'📄':tip==='png'||tip==='jpg'?'🖼':'📎';}

function render(){
  if(curView==='home')renderHome();

    <div class="stat"><div class="stat-num" style="color:#1a1a18">${personeller.filter(p=>p.aktif).length}</div><div class="stat-label">Aktif Personel</div></div>
    <div class="stat"><div class="stat-num" style="color:#888">${personeller.filter(p=>!p.aktif).length}</div><div class="stat-label">İşten Çıkan</div></div>

    <button class="nav-tab active">İşyerleri</button>

  </div>
  <div class="card"><div class="card-header"><span class="card-title">İşyerleri</span></div>
  <table><thead><tr><th>İşyeri Adı</th><th>NACE</th><th>Tehlike Sınıfı</th><th>Yetkili</th><th>Personel</th><th>Durum</th><th></th></tr></thead><tbody>`;
  firmalar.forEach(f=>{
    const pc=personeller.filter(p=>p.fid===f.id&&p.aktif).length;
    const allSt=[...f.belgeler.map(b=>st(b.bitis)),...(f.ekipmanlar||[]).map(e=>st(ekipBitis(e)))];
    personeller.filter(p=>p.fid===f.id&&p.aktif).forEach(p=>{allSt.push(st(persIsgBitis(p)),st(persSaglikBitis(p)));p.belgeler.forEach(b=>allSt.push(st(b.bitis)));});
    const bs=worst(allSt);
    h+=`<tr style="cursor:pointer" onclick="goFirma('${f.id}')">
      <td style="font-weight:600">${f.ad}</td><td style="color:#888">${f.nace||'—'}</td>

      <td onclick="event.stopPropagation()"><div class="ibtns">

        <button class="ibtn del" onclick="delFirma('${f.id}')">Sil</button>
      </div></td></tr>`;
  });
  if(!firmalar.length)h+=`<tr><td colspan="7" class="empty-state">Henüz işyeri yok.</td></tr>`;
  h+=`</tbody></table></div>`;
  document.getElementById('main').innerHTML=h;updateBadge();
}

function renderFirma(){
  const f=firmalar.find(x=>x.id===curFirmaId);if(!f){goHome();return;}
  updateBreadcrumb([{label:f.ad}]);
  let h=`<div class="inner-tabs">
    <button class="itab ${curTab==='bilgiler'?'active':''}" onclick="switchTab('bilgiler')">Firma Bilgileri</button>
    <button class="itab ${curTab==='belgeler'?'active':''}" onclick="switchTab('belgeler')">Firma Belgeleri</button>
    <button class="itab ${curTab==='personeller'?'active':''}" onclick="switchTab('personeller')">Personeller</button>
    <button class="itab ${curTab==='ekipmanlar'?'active':''}" onclick="switchTab('ekipmanlar')">Ekipmanlar</button>
  </div>`;

}

function renderFirmaBelgeler(f){
  document.getElementById('add-btn').textContent='+ Belge Ekle';
  if(!f.belgeler.length)return`<div class="card"><div class="empty-state"><p>Henüz belge yok.</p><br><button class="btn btn-primary" onclick="openBelgeModal()">+ Ekle</button></div></div>`;
  let h=`<div class="card"><table><thead><tr><th>Belge Adı</th><th>Tür</th><th>Hazırlanma</th><th>Bitiş</th><th>Durum</th><th>Kalan</th><th>Dosyalar</th><th></th></tr></thead><tbody>`;
  f.belgeler.forEach(b=>{
    const s=st(b.bitis);const d=diff(b.bitis);
    const k=!b.bitis?'—':d<0?`${Math.abs(d)} gün geçti`:`${d} gün kaldı`;
    const dosyaSayisi=(b.pdfler||[]).length;
    h+=`<tr>
      <td style="font-weight:600">${b.ad}</td>
      <td><span class="badge ${b.tip==='mevzuat'?'badge-blue':'badge-gray'}">${b.tip==='mevzuat'?'Mevzuat':'Manuel'}</span></td>
      <td style="color:#888">${fmt(b.hazirlik)}</td><td>${fmt(b.bitis)}</td>
      <td><span class="badge badge-${s}">${lbl(s)}</span></td>
      <td style="color:${s==='red'?'#dc2626':s==='amber'?'#d97706':'#16a34a'};font-weight:500;font-size:12px">${k}</td>
      <td>${dosyaSayisi?`<span class="badge badge-blue">${dosyaSayisi} dosya</span>`:`<span style="color:#aaa;font-size:12px">—</span>`}</td>
      <td><div class="ibtns">
        <button class="ibtn" onclick="openBelgeModal('${b.id}')">Düzenle</button>
        <button class="ibtn" onclick="openBelgeDosyaModal('${f.id}','${b.id}')">📎 Dosya</button>
        <button class="ibtn del" onclick="delBelge('${f.id}','${b.id}')">Sil</button>
      </div></td></tr>`;
  });
  h+=`</tbody></table></div>`;return h;
}

function renderPersonelListesi(f){
  document.getElementById('add-btn').textContent='+ Personel Ekle';
  const psAktif=personeller.filter(p=>p.fid===f.id&&p.aktif);
  const bolumler=f.bolumler||[];
  let h=`<div class="bolum-filter">
    <span style="font-size:12px;color:#888;font-weight:600">Bölüm:</span>
    <button class="bolum-chip ${curBolumFilter==='hepsi'?'active':''}" onclick="setBolumFilter('hepsi')">Tümü (${psAktif.length})</button>
    ${bolumler.map(b=>{const c=psAktif.filter(p=>p.bolum===b).length;return`<button class="bolum-chip ${curBolumFilter===b?'active':''}" onclick="setBolumFilter('${b}')">${b} (${c})</button>`;}).join('')}
    ${psAktif.some(p=>!p.bolum||!bolumler.includes(p.bolum))?`<button class="bolum-chip ${curBolumFilter==='diger'?'active':''}" onclick="setBolumFilter('diger')">Atanmamış</button>`:''}
  </div>`;
  let filtre=psAktif;
  if(curBolumFilter==='diger')filtre=psAktif.filter(p=>!p.bolum||!bolumler.includes(p.bolum));
  else if(curBolumFilter!=='hepsi')filtre=psAktif.filter(p=>p.bolum===curBolumFilter);
  if(!filtre.length){h+=`<div class="card"><div class="empty-state"><p>${psAktif.length?'Bu bölümde personel yok.':'Henüz personel yok.'}</p>${!psAktif.length?'<br><button class="btn btn-primary" onclick="openPersonelModal()">+ Ekle</button>':''}</div></div>`;return h;}
  if(curBolumFilter==='hepsi'&&bolumler.length>0){
    const gruplar={};
    filtre.forEach(p=>{const b=(p.bolum&&bolumler.includes(p.bolum))?p.bolum:'Atanmamış';if(!gruplar[b])gruplar[b]=[];gruplar[b].push(p);});
    const sira=[...bolumler];if(gruplar['Atanmamış'])sira.push('Atanmamış');
    h+=`<div class="card">`;
    sira.forEach(ba=>{
      if(!gruplar[ba]||!gruplar[ba].length)return;
      h+=`<div class="bolum-group-header">${ba} — ${gruplar[ba].length} kişi</div>`;
      h+=`<table><thead><tr><th style="width:40px"></th><th>Ad Soyad</th><th>Görevi</th><th>İSG Bitiş</th><th>Sağlık Bitiş</th><th>Durum</th><th></th></tr></thead><tbody>`;
      gruplar[ba].forEach(p=>{h+=pSatir(p,false);});h+=`</tbody></table>`;
    });h+=`</div>`;
  }else{
    h+=`<div class="card"><table><thead><tr><th style="width:40px"></th><th>Ad Soyad</th><th>Bölüm</th><th>Görevi</th><th>İSG Bitiş</th><th>Sağlık Bitiş</th><th>Durum</th><th></th></tr></thead><tbody>`;
    filtre.forEach(p=>{h+=pSatir(p,true);});h+=`</tbody></table></div>`;
  }
  return h;
}
function pSatir(p,showBolum){
  const ib=persIsgBitis(p);const sb=persSaglikBitis(p);
  const ov=worst([st(ib),st(sb),...p.belgeler.map(b=>st(b.bitis))]);
  return `<tr style="cursor:pointer" onclick="goPersonel('${p.id}')">
    <td>${avatarHtml(p)}</td><td style="font-weight:600">${p.ad}</td>
    ${showBolum?`<td><span class="badge badge-purple">${p.bolum||'—'}</span></td>`:''}
    <td style="color:#888;font-size:12px">${p.gorev||'—'}</td>
    <td><span class="badge badge-${st(ib)}">${fmt(ib)||'Girilmedi'}</span></td>
    <td><span class="badge badge-${st(sb)}">${fmt(sb)||'Girilmedi'}</span></td>
    <td><span class="badge badge-${ov}">${lbl(ov)}</span></td>
    <td onclick="event.stopPropagation()"><div class="ibtns">
      <button class="ibtn" onclick="goPersonel('${p.id}')">Detay</button>
      <button class="ibtn" onclick="openPersonelModal('${p.id}')">Düzenle</button>
      <button class="ibtn warn" onclick="istenCikar('${p.id}')">Çıkış</button>
      <button class="ibtn del" onclick="delPersonel('${p.id}')">Sil</button>
    </div></td></tr>`;
}

  ekipmanlar.forEach(e=>{

      <td style="color:#888;font-size:12px">${e.sorumlAd||'—'}</td>
      <td style="color:#888;font-size:12px">${fmt(e.sonBakim)}</td>
      <td>${fmt(bit)}</td>

  if(e.fotolar&&e.fotolar.length){

  h+=`<div class="card"><div class="card-header"><span class="card-title">Belgeler / Dosyalar</span><button class="btn btn-primary" style="font-size:12px;padding:5px 12px" onclick="openEkipmanBelgeModal('${e.id}')">+ Belge Ekle</button></div>`;
  if(!(e.belgeler||[]).length){h+=`<div style="padding:24px;text-align:center;color:#aaa;font-size:13px">Henüz belge yok.</div>`;}
  else{
    e.belgeler.forEach(d2=>{
      h+=`<div class="dosya-satir">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;background:#eff6ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${fileIcon(d2.tip)}</div>
          <div><div style="font-size:13px;font-weight:600">${d2.ad}</div><div style="font-size:11px;color:#aaa">${fmt(d2.tarih)}${d2.not?' · '+d2.not:''}</div></div>
        </div>
        <div class="ibtns">
          ${d2.veri?`<button class="ibtn" onclick="dosyaIndir('${d2.id}','${e.id}','ekipman')">İndir</button>`:''}
          <button class="ibtn del" onclick="delEkipmanBelge('${e.id}','${d2.id}')">Sil</button>
        </div>
      </div>`;
    });
  }
  h+=`</div>`;
  document.getElementById('main').innerHTML=h;updateBadge();
}

function goHome(){curView='home';curFirmaId=null;curPersonelId=null;curEkipmanId=null;render();}

function updateBreadcrumb(items){
  let h='';
  if(items.length>=1){
    h=`<span class="bc-link" onclick="goHome()">İşyerleri</span> / `;
    if(items.length===2)h+=`<span class="bc-link" onclick="goFirma('${curFirmaId}')">${items[0].label}</span> / <span style="color:#1a1a18">${items[1].label}</span>`;
    else h+=`<span style="color:#1a1a18">${items[0].label}</span>`;
  }
  document.getElementById('breadcrumb').innerHTML=h;
}

// ============================================================
// STATS & BİLDİRİM
// ============================================================
function calcGlobalStats(){
  let exp=0,son=0,ok=0;
  firmalar.forEach(f=>{
    f.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
    (f.ekipmanlar||[]).forEach(e=>{const s=st(ekipBitis(e));if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
  });
  personeller.filter(p=>p.aktif).forEach(p=>{
    [persIsgBitis(p),persSaglikBitis(p)].forEach(d=>{const s=st(d);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
    p.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
  });
  return{exp,son,ok};
}
function getAlerts(){
  const a=[];
  firmalar.forEach(f=>{
    f.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red'||s==='amber')a.push({id:`f_${f.id}_${b.id}`,type:s,name:f.ad,cat:'Firma',evrak:b.ad,tarih:b.bitis,dif:diff(b.bitis)});});
    (f.ekipmanlar||[]).forEach(e=>{const bit=ekipBitis(e);const s=st(bit);if(s==='red'||s==='amber')a.push({id:`e_${f.id}_${e.id}`,type:s,name:e.ad,cat:'Ekipman',sub:f.ad,evrak:'Periyodik Bakım',tarih:bit,dif:diff(bit)});});
  });
  personeller.filter(p=>p.aktif).forEach(p=>{
    const f=firmalar.find(x=>x.id===p.fid);
    [{evrak:'İSG Eğitimi',tarih:persIsgBitis(p)},{evrak:'Sağlık Raporu',tarih:persSaglikBitis(p)},...p.belgeler.map(b=>({evrak:b.ad,tarih:b.bitis}))]
      .forEach((c,i)=>{const s=st(c.tarih);if(s==='red'||s==='amber')a.push({id:`p_${p.id}_${i}`,type:s,name:p.ad,cat:'Personel',sub:f?f.ad:'',evrak:c.evrak,tarih:c.tarih,dif:diff(c.tarih)});});
  });
  return a.sort((a,b)=>a.dif-b.dif);
}
function updateBadge(){
  const n=getAlerts().filter(a=>!okunanBildirimler.has(a.id)).length;
  const d=document.getElementById('ndot');
  if(n>0){d.textContent=n;d.classList.remove('hidden');}else d.classList.add('hidden');
}
function openNotif(){
  const alerts=getAlerts();
  document.getElementById('ncnt').textContent=alerts.length?`(${alerts.length} uyarı)`:'';
  renderNotifList(alerts);
  document.getElementById('nov').classList.remove('hidden');
}
function renderNotifList(alerts){
  let h='';
  if(!alerts.length)h='<div style="text-align:center;padding:24px;color:#aaa">Tüm evraklar geçerli!</div>';
  else alerts.forEach(a=>{
    const okunan=okunanBildirimler.has(a.id);
    const desc=a.dif<0?`${Math.abs(a.dif)} gün önce sona erdi`:`${a.dif} gün içinde sona erecek`;
    h+=`<div class="nitem ${okunan?'read':''}">
      <div class="navt ${a.type}">${ini(a.name)}</div>
      <div class="nbody">
        <div class="nname">${a.name}${a.sub?` <span style="font-weight:400;color:#aaa;font-size:11px">(${a.sub})</span>`:''}</div>
        <div class="ndesc">${a.evrak} · ${a.cat}</div>
        <div class="ndate">${fmt(a.tarih)} · ${desc}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <span class="badge badge-${a.type}">${a.type==='red'?'Geçmiş':'Yakın'}</span>
        <button class="ibtn" style="font-size:10px" onclick="bildirimOkundu('${a.id}')">${okunan?'Okundu ✓':'Okundu'}</button>
        <button class="ibtn del" style="font-size:10px" onclick="bildirimSil('${a.id}')">Sil</button>
      </div>
    </div>`;
  });
  document.getElementById('nlist').innerHTML=h;
}
function bildirimOkundu(id){okunanBildirimler.add(id);updateBadge();renderNotifList(getAlerts());}
function bildirimSil(id){
  // Sil = okunanlar listesine ekle ve arayüzden kaldır (gerçek silme için backend gerekir)
  okunanBildirimler.add(id);
  const alerts=getAlerts().filter(a=>!okunanBildirimler.has(a.id)||a.id!==id);
  updateBadge();renderNotifList(getAlerts());
}
function tumunuOkunduYap(){getAlerts().forEach(a=>okunanBildirimler.add(a.id));updateBadge();renderNotifList(getAlerts());}
function okunanlarSil(){getAlerts().filter(a=>okunanBildirimler.has(a.id));updateBadge();renderNotifList(getAlerts());}

// ============================================================
// İŞTEN ÇIKIŞ
// ============================================================
function istenCikar(pid){
  const p=personeller.find(x=>x.id===pid);if(!p)return;
  const tarih=prompt(`${p.ad} için işten çıkış tarihi (YYYY-AA-GG):`,today.toISOString().slice(0,10));
  if(tarih===null)return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(tarih)){alert('Geçersiz format.');return;}
  if(!confirm(`${p.ad} — Çıkış tarihi: ${fmt(tarih)}\nOnaylıyor musunuz?`))return;
  p.aktif=false;p.cikis_tarihi=tarih;
  if(curView==='personel')renderPersonelDetay();else render();
}
function geriAl(pid){
  const p=personeller.find(x=>x.id===pid);if(!p||!confirm(`${p.ad} tekrar aktif yapılsın mı?`))return;
  p.aktif=true;p.cikis_tarihi='';render();
}

function handleAdd(){
  if(curView==='home'||curView==='cikanlar')openFirmaModal();
  else if(curView==='firma'&&curTab==='bilgiler')openFirmaModal(curFirmaId);
  else if(curView==='firma'&&curTab==='belgeler')openBelgeModal();
  else if(curView==='firma'&&curTab==='personeller')openPersonelModal();
  else if(curView==='firma'&&curTab==='ekipmanlar')openEkipmanModal();
  else if(curView==='personel'){const p=personeller.find(x=>x.id===curPersonelId);if(p&&p.aktif)openPersonelBelgeModal(curPersonelId);}
}

      <div class="frow"><label>Son Bakım Tarihi</label><input id="ek-bakim" type="date" value="${e?e.sonBakim||'':''}" oninput="calcEkipBitis()"/></div>
      <div class="frow"><label>Bakım Periyodu</label><select id="ek-periyot" onchange="calcEkipBitis()">
        <option value="">— Seçin —</option>
        ${PERIYOT_SECENEKLER.map(p=>`<option value="${p.val}" ${e&&e.periyot==p.val?'selected':''}>${p.label}</option>`).join('')}
      </select></div>
    </div>
    <div class="frow"><label>Bakım Bitiş Tarihi</label><input id="ek-bitis" type="date" value="${e?e.bitTarih||'':''}"/><div class="hint hidden" id="ek-hint"></div><div class="hint-neutral">Son bakım ve periyot seçince otomatik hesaplanır.</div></div>`;
  document.getElementById('ov').classList.remove('hidden');
}
function calcEkipBitis(){
  const bakim=document.getElementById('ek-bakim').value;
  const periyot=document.getElementById('ek-periyot').value;
  if(!bakim||!periyot)return;
  const bitis=addD(bakim,parseInt(periyot));
  document.getElementById('ek-bitis').value=bitis;
  const h=document.getElementById('ek-hint');h.textContent=`Otomatik: ${fmt(bitis)}`;h.classList.remove('hidden');
}

// MODAL: EKİPMAN BELGE
function openEkipmanBelgeModal(eid){
  editId=null;editType='ekipman-belge';editSubType=eid;
  const f=firmalar.find(x=>x.id===curFirmaId);
  const e=(f.ekipmanlar||[]).find(x=>x.id===eid);
  document.getElementById('mtitle').textContent='Ekipman Belgesi Ekle';
  document.getElementById('save-btn').classList.add('hidden');
  const liste=(e.belgeler||[]).map((d,i)=>`<div class="dosya-satir"><div style="display:flex;align-items:center;gap:10px;"><div style="width:32px;height:32px;background:#eff6ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">${fileIcon(d.tip)}</div><div><div style="font-size:13px;font-weight:600">${d.ad}</div><div style="font-size:11px;color:#aaa">${d.tip?d.tip.toUpperCase():''}</div></div></div><div class="ibtns">${d.veri?`<button class="ibtn" onclick="ekipBelgeIndir('${eid}','${d.id}')">İndir</button>`:''}<button class="ibtn del" onclick="delEkipmanBelgeInModal('${eid}',${i})">Sil</button></div></div>`).join('');
  document.getElementById('mbody').innerHTML=`
    <div style="margin-bottom:12px">${liste||'<div style="color:#aaa;font-size:13px;padding:12px 0">Henüz belge eklenmemiş.</div>'}</div>
    <div class="section-title">Dosya Yükle</div>
    <div class="upload-area" onclick="document.getElementById('ekip-file-input').click()">
      <div style="font-size:24px;margin-bottom:6px">📎</div>
      <div style="font-size:13px;color:#888">PDF, PNG, JPG — max 5MB</div>
      <input type="file" id="ekip-file-input" accept=".pdf,.png,.jpg,.jpeg" onchange="onEkipBelgeSecildi(this,'${eid}')"/>
    </div>`;
  document.getElementById('ov').classList.remove('hidden');
}
function onEkipBelgeSecildi(input,eid){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('5MB\'dan büyük olamaz!');return;}
  const reader=new FileReader();
  reader.onload=e2=>{
    const f=firmalar.find(x=>x.id===curFirmaId);
    const ek=(f.ekipmanlar||[]).find(x=>x.id===eid);
    if(!ek.belgeler)ek.belgeler=[];
    const tip=file.name.split('.').pop().toLowerCase();
    ek.belgeler.push({id:uid(),ad:file.name,tip,veri:e2.target.result});
    openEkipmanBelgeModal(eid);
  };reader.readAsDataURL(file);
}
function ekipBelgeIndir(eid,did){const f=firmalar.find(x=>x.id===curFirmaId);const e=(f.ekipmanlar||[]).find(x=>x.id===eid);const d=(e.belgeler||[]).find(x=>x.id===did);if(!d||!d.veri)return;const a=document.createElement('a');a.href=d.veri;a.download=d.ad;a.click();}
function delEkipmanBelgeInModal(eid,idx){if(!confirm('Bu belge silinsin mi?'))return;const f=firmalar.find(x=>x.id===curFirmaId);const e=(f.ekipmanlar||[]).find(x=>x.id===eid);e.belgeler.splice(idx,1);openEkipmanBelgeModal(eid);}
function delEkipmanBelge(eid,did){if(!confirm('Bu belge silinsin mi?'))return;const f=firmalar.find(x=>x.id===curFirmaId);const e=(f.ekipmanlar||[]).find(x=>x.id===eid);e.belgeler=(e.belgeler||[]).filter(x=>x.id!==did);goEkipman(eid);}

// MODAL: EKİPMAN FOTOĞRAF
function openEkipmanFotoModal(eid){
  editId=eid;editType='ekipman-foto';
  const f=firmalar.find(x=>x.id===curFirmaId);
  const e=(f.ekipmanlar||[]).find(x=>x.id===eid);
  document.getElementById('mtitle').textContent='Ekipman Fotoğrafı Ekle';
  document.getElementById('save-btn').classList.add('hidden');
  const galeri=(e.fotolar||[]).map((src,i)=>`<div style="position:relative"><img src="${src}" style="width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;border:1px solid #e5e5e0"/><button onclick="delEkipmanFotoInModal('${eid}',${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:4px;padding:2px 5px;cursor:pointer;font-size:10px">✕</button></div>`).join('');
  document.getElementById('mbody').innerHTML=`
    ${galeri?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:14px">${galeri}</div>`:''}
    <div class="upload-area" onclick="document.getElementById('ekip-foto-input').click()">
      <div style="font-size:24px;margin-bottom:6px">📷</div>
      <div style="font-size:13px;color:#888">Fotoğraf seçmek için tıklayın</div>
      <div style="font-size:11px;color:#aaa;margin-top:4px">PNG, JPG — max 2MB</div>
      <input type="file" id="ekip-foto-input" accept="image/*" onchange="onEkipFotoSecildi(this,'${eid}')"/>
    </div>`;
  document.getElementById('ov').classList.remove('hidden');
}
function onEkipFotoSecildi(input,eid){
  const file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){alert('Fotoğraf 2MB\'dan büyük olamaz!');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const f=firmalar.find(x=>x.id===curFirmaId);
    const ek=(f.ekipmanlar||[]).find(x=>x.id===eid);
    if(!ek.fotolar)ek.fotolar=[];
    ek.fotolar.push(e.target.result);
    openEkipmanFotoModal(eid);
  };reader.readAsDataURL(file);
}
function delEkipmanFotoInModal(eid,idx){if(!confirm('Bu fotoğraf silinsin mi?'))return;const f=firmalar.find(x=>x.id===curFirmaId);const e=(f.ekipmanlar||[]).find(x=>x.id===eid);e.fotolar.splice(idx,1);openEkipmanFotoModal(eid);}
function delEkipmanFoto(eid,idx){if(!confirm('Bu fotoğraf silinsin mi?'))return;const f=firmalar.find(x=>x.id===curFirmaId);const e=(f.ekipmanlar||[]).find(x=>x.id===eid);e.fotolar.splice(idx,1);goEkipman(eid);}

// MODAL: PERSONEL FOTOĞRAF
function openFotoModal(pid){
  editId=pid;editType='foto';
  const p=personeller.find(x=>x.id===pid);
  document.getElementById('save-btn').classList.add('hidden');
  document.getElementById('mtitle').textContent='Profil Fotoğrafı';
  document.getElementById('mbody').innerHTML=`
    <div class="upload-area" onclick="document.getElementById('foto-input').click()">
      ${p.foto?`<img src="${p.foto}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;border:3px solid #e5e5e0"/>`:`<div style="width:80px;height:80px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#1e40af;margin:0 auto 10px;">${ini(p.ad)}</div>`}
      <div style="font-size:13px;color:#888">Tıklayın</div><div style="font-size:11px;color:#aaa;margin-top:4px">JPG veya PNG, max 2MB</div>
      <input type="file" id="foto-input" accept="image/*" onchange="onFotoSecildi(this,'${pid}')"/>
    </div>
    ${p.foto?`<div style="margin-top:12px;text-align:center"><button class="ibtn del" onclick="fotoyuSil('${pid}')">Fotoğrafı Kaldır</button></div>`:''}`;
  document.getElementById('ov').classList.remove('hidden');
}
function onFotoSecildi(input,pid){const file=input.files[0];if(!file)return;if(file.size>2*1024*1024){alert('2MB\'dan büyük olamaz!');return;}const reader=new FileReader();reader.onload=e=>{personeller.find(x=>x.id===pid).foto=e.target.result;closeModal();if(curView==='personel')renderPersonelDetay();else render();};reader.readAsDataURL(file);}
function fotoyuSil(pid){const p=personeller.find(x=>x.id===pid);if(p)p.foto='';closeModal();if(curView==='personel')renderPersonelDetay();else render();}

// ============================================================
// KAYDET
// ============================================================
function closeModal(){document.getElementById('ov').classList.add('hidden');editId=null;editType=null;editSubType=null;}
function save(){
  if(editType==='firma')saveFirma();
  else if(editType==='bolum'||editType==='ozel-ekip'){closeModal();if(curView==='firma')renderFirma();else render();}
  else if(editType==='firma-belge')saveFirmaBelge();
  else if(editType==='personel')savePersonel();
  else if(editType==='personel-belge')savePersonelBelge();
  else if(editType==='ekipman')saveEkipman();
}
function saveFirma(){
  const ad=document.getElementById('f-ad').value.trim();if(!ad){alert('Firma adı zorunlu!');return;}
  const data={ad,ts:document.getElementById('f-ts').value,nace:document.getElementById('f-nace').value.trim(),vergi:document.getElementById('f-vergi').value.trim(),sgk:document.getElementById('f-sgk').value.trim(),yetkili:document.getElementById('f-yetkili').value.trim(),telefon:document.getElementById('f-telefon').value.trim(),email:document.getElementById('f-email').value.trim(),adres:document.getElementById('f-adres').value.trim()};
  if(editId)Object.assign(firmalar.find(x=>x.id===editId),data);
  else firmalar.push({id:uid(),...data,bolumler:[],ozelEkipler:[],belgeler:[],ekipmanlar:[]});
  closeModal();render();
}
function saveFirmaBelge(){
  const f=firmalar.find(x=>x.id===curFirmaId);if(!f)return;
  const tipVal=document.getElementById('b-tip').value;
  const hazirlik=document.getElementById('b-hazirlik').value;
  const bitis=document.getElementById('b-bitis').value;
  if(!hazirlik||!bitis){alert('Tarihler zorunlu!');return;}
  let rec;
  if(tipVal.startsWith('mevzuat_')){const key=tipVal.replace('mevzuat_','');rec={id:editId||uid(),ad:FIRMA_MEVZUAT.find(m=>m.key===key)?.label||key,tip:'mevzuat',key,hazirlik,bitis,pdfler:[]};}
  else{const ad=document.getElementById('b-ad').value.trim();if(!ad){alert('Belge adı zorunlu!');return;}rec={id:editId||uid(),ad,tip:'manuel',sure:parseInt(document.getElementById('b-sure').value),hazirlik,bitis,pdfler:[]};}
  if(editId){const i=f.belgeler.findIndex(x=>x.id===editId);const old=f.belgeler[i];rec.pdfler=old.pdfler||[];f.belgeler[i]=rec;}else f.belgeler.push(rec);
  closeModal();renderFirma();
}
function savePersonel(){
  const ad=document.getElementById('p-ad').value.trim();if(!ad){alert('Ad Soyad zorunlu!');return;}
  const f=firmalar.find(x=>x.id===curFirmaId);
  const tumEkipKeys=[...ACIL_EKIP,...(f?f.ozelEkipler||:[])].map(e=>e.key);
  const acilEkipler=tumEkipKeys.filter(k=>{const el=document.getElementById('ae-'+k);return el&&el.checked;});
  const data={ad,tc:document.getElementById('p-tc').value.trim(),dogum:document.getElementById('p-dogum').value,cinsiyet:document.getElementById('p-cinsiyet').value,medeni:document.getElementById('p-medeni').value,kan:document.getElementById('p-kan').value,egitim:document.getElementById('p-egitim').value,telefon:document.getElementById('p-telefon').value.trim(),email:document.getElementById('p-email').value.trim(),ise_giris:document.getElementById('p-ise').value,gorev:document.getElementById('p-gorev').value.trim(),bolum:document.getElementById('p-bolum').value,adres:document.getElementById('p-adres').value.trim(),isg_tarih:document.getElementById('p-isg').value,saglik_tarih:document.getElementById('p-saglik').value,acilEkipler};
  if(editId)Object.assign(personeller.find(x=>x.id===editId),data);
  else personeller.push({id:uid(),fid:curFirmaId,...data,aktif:true,cikis_tarihi:'',foto:'',belgeler:[],dosyalar:[]});
  closeModal();if(curView==='personel')renderPersonelDetay();else render();
}
function savePersonelBelge(){
  const pid=editSubType;const p=personeller.find(x=>x.id===pid);if(!p)return;
  const tipVal=document.getElementById('pb-tip').value;
  const hazirlik=document.getElementById('pb-hazirlik').value;const bitis=document.getElementById('pb-bitis').value;
  if(!hazirlik||!bitis){alert('Tarihler zorunlu!');return;}
  let rec;
  if(tipVal.startsWith('mevzuat_')){const key=tipVal.replace('mevzuat_','');rec={id:editId||uid(),ad:PERS_MEVZUAT.find(m=>m.key===key)?.label||key,tip:'mevzuat',key,hazirlik,bitis};}
  else{const ad=document.getElementById('pb-ad').value.trim();if(!ad){alert('Belge adı zorunlu!');return;}rec={id:editId||uid(),ad,tip:'manuel',sure:parseInt(document.getElementById('pb-sure').value),hazirlik,bitis};}
  if(editId){const i=p.belgeler.findIndex(x=>x.id===editId);p.belgeler[i]=rec;}else p.belgeler.push(rec);
  closeModal();goPersonel(pid);
}
function saveEkipman(){
  const ad=document.getElementById('ek-ad').value.trim();if(!ad){alert('Ekipman adı zorunlu!');return;}
  const periyot=parseInt(document.getElementById('ek-periyot').value)||0;
  const sonBakim=document.getElementById('ek-bakim').value;
  const bitTarih=document.getElementById('ek-bitis').value||(sonBakim&&periyot?addD(sonBakim,periyot):'');
  const rec={ad,marka:document.getElementById('ek-marka').value.trim(),model:document.getElementById('ek-model').value.trim(),seri:document.getElementById('ek-seri').value.trim(),konum:document.getElementById('ek-konum').value.trim(),sorumlAd:document.getElementById('ek-soruml-ad').value.trim(),sorumlTel:document.getElementById('ek-soruml-tel').value.trim(),sonBakim,periyot,bitTarih};
  const f=firmalar.find(x=>x.id===curFirmaId);if(!f.ekipmanlar)f.ekipmanlar=[];
  if(editId){const i=f.ekipmanlar.findIndex(x=>x.id===editId);const old=f.ekipmanlar[i];f.ekipmanlar[i]={...old,...rec};}
  else f.ekipmanlar.push({id:uid(),...rec,belgeler:[],fotolar:[]});
  closeModal();renderFirma();
}

// ============================================================
// SİL
// ============================================================
function delFirma(id){if(!confirm('Bu firmayı ve tüm personellerini silmek istediğinizden emin misiniz?'))return;firmalar=firmalar.filter(x=>x.id!==id);personeller=personeller.filter(x=>x.fid!==id);render();}
function delBelge(fid,bid){if(!confirm('Bu belgeyi silmek istediğinizden emin misiniz?'))return;const f=firmalar.find(x=>x.id===fid);if(f)f.belgeler=f.belgeler.filter(x=>x.id!==bid);renderFirma();}
function delPersonel(id){if(!confirm('Bu personeli kalıcı olarak silmek istediğinizden emin misiniz?'))return;personeller=personeller.filter(x=>x.id!==id);render();}
function delPersonelBelge(pid,bid){if(!confirm('Bu belgeyi silmek istediğinizden emin misiniz?'))return;const p=personeller.find(x=>x.id===pid);if(p){p.belgeler=p.belgeler.filter(x=>x.id!==bid);goPersonel(pid);}}
function delEkipman(fid,eid){if(!confirm('Bu ekipmanı silmek istediğinizden emin misiniz?'))return;const f=firmalar.find(x=>x.id===fid);if(f)f.ekipmanlar=(f.ekipmanlar||[]).filter(x=>x.id!==eid);renderFirma();}

render();
</script>
</body>
</html>
