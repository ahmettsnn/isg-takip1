<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISG Takip Sistemi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar h1{font-size:16px;font-weight:700;}
.breadcrumb{font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px;}
.bc-link{cursor:pointer;color:#1a5fa8;}.bc-link:hover{text-decoration:underline;}
.topbar-btns{display:flex;gap:8px;}
.btn{padding:7px 14px;font-size:13px;cursor:pointer;border-radius:8px;font-family:inherit;border:1px solid #e5e5e0;background:#fff;color:#1a1a18;white-space:nowrap;}
.btn:hover{background:#f0f0ea;}
.btn-primary{background:#1a5fa8;color:#fff;border-color:#1a5fa8;}
.btn-primary:hover{background:#154d8a;}
.btn-notif{position:relative;}
.ndot{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:#dc2626;border-radius:50%;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.container{max-width:1100px;margin:0 auto;padding:20px 16px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-size:24px;font-weight:700;}.stat-label{font-size:11px;color:#888;margin-top:3px;}
.c-red{color:#dc2626;}.c-amber{color:#d97706;}.c-green{color:#16a34a;}.c-blue{color:#1a5fa8;}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 16px;border-bottom:1px solid #f0f0ea;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:15px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 12px;color:#888;font-weight:600;border-bottom:1px solid #e5e5e0;font-size:11px;white-space:nowrap;background:#fafaf8;}
tbody tr{border-bottom:1px solid #f0f0ea;}
tbody tr:hover{background:#fafaf8;}
tbody td{padding:9px 12px;vertical-align:middle;}
.ibtns{display:flex;gap:4px;flex-wrap:wrap;}
.ibtn{padding:3px 9px;font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit;border:1px solid #e5e5e0;background:transparent;color:#666;}
.ibtn:hover{background:#f0f0ea;}
.ibtn.del:hover{background:#fef2f2;color:#991b1b;border-color:#fecaca;}
.ibtn.warn{color:#92400e;border-color:#fde68a;background:#fffbeb;}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-red{background:#fef2f2;color:#991b1b;}.badge-amber{background:#fffbeb;color:#92400e;}
.badge-green{background:#f0fdf4;color:#166534;}.badge-blue{background:#eff6ff;color:#1e40af;}
.badge-gray{background:#f3f4f6;color:#4b5563;}.badge-purple{background:#f5f3ff;color:#6d28d9;}
.badge-orange{background:#fff7ed;color:#c2410c;}
.ts-az{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;}
.ts-teh{background:#fffbeb;color:#92400e;border:1px solid #fde68a;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;}
.ts-cok{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;}
.inner-tabs{display:flex;border-bottom:2px solid #f0f0ea;margin-bottom:20px;overflow-x:auto;}
.itab{padding:10px 14px;font-size:13px;cursor:pointer;background:transparent;border:none;color:#888;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.itab.active{color:#1a5fa8;border-bottom-color:#1a5fa8;font-weight:600;}
.nav-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;}
.nav-tab{padding:7px 16px;font-size:13px;cursor:pointer;border-radius:8px;font-family:inherit;border:1px solid #e5e5e0;background:#fff;color:#888;}
.nav-tab.active{background:#1a5fa8;color:#fff;border-color:#1a5fa8;font-weight:600;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.info-item label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;}
.info-item .val{font-size:14px;font-weight:500;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.modal h2{font-size:17px;font-weight:600;margin-bottom:18px;}
.frow{margin-bottom:12px;}
.frow label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500;}
.frow input,.frow select,.frow textarea{width:100%;padding:8px 11px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;font-family:inherit;}
.frow textarea{resize:vertical;min-height:60px;}
.frow input:focus,.frow select:focus{outline:none;border-color:#1a5fa8;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.hidden{display:none!important;}
.section-title{font-size:11px;font-weight:700;color:#aaa;margin:16px 0 10px;text-transform:uppercase;letter-spacing:.6px;padding-bottom:6px;border-bottom:1px solid #f0f0ea;}
.hint{font-size:11px;color:#16a34a;margin-top:4px;font-weight:500;}
.hint-neutral{font-size:11px;color:#aaa;margin-top:4px;}
.mevzuat-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;font-size:12px;color:#1e40af;margin-bottom:14px;}
.npanel{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.npanel h2{font-size:17px;font-weight:600;margin-bottom:14px;}
.nitem{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0ea;}
.nitem:last-child{border-bottom:none;}
.nitem.read{opacity:.45;}
.navt{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;}
.navt.red{background:#fef2f2;color:#991b1b;}.navt.amber{background:#fffbeb;color:#92400e;}
.nbody{flex:1;min-width:0;}
.nname{font-size:13px;font-weight:600;}
.ndesc{font-size:12px;color:#888;margin-top:2px;}.ndate{font-size:11px;color:#bbb;margin-top:2px;}
.empty-state{text-align:center;padding:40px 20px;color:#aaa;}
.personel-kart{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:20px;margin-bottom:16px;}
.kart-baslik{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
.belge-satir{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0ea;gap:12px;flex-wrap:wrap;}
.belge-satir:last-child{border-bottom:none;}
.belge-ad{font-size:13px;font-weight:600;min-width:120px;}
.belge-tarihler{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.tarih-grup .tlabel{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;}
.tarih-grup .tval{font-size:12px;font-weight:500;margin-top:2px;}
.bolum-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.bolum-chip{padding:5px 12px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid #e5e5e0;background:#fff;color:#666;font-family:inherit;}
.bolum-chip:hover{background:#f0f0ea;}.bolum-chip.active{background:#1a5fa8;color:#fff;border-color:#1a5fa8;}
.bolum-group-header{padding:8px 12px;background:#f9f9f7;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;border-bottom:1px solid #f0f0ea;}
.avatar{width:40px;height:40px;border-radius:50%;background:#eff6ff;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-lg{width:72px;height:72px;border-radius:50%;background:#eff6ff;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;overflow:hidden;border:3px solid #e5e5e0;}
.avatar-lg img{width:100%;height:100%;object-fit:cover;}
.ekip-foto{width:56px;height:56px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;border:1px solid #e5e5e0;}
.ekip-foto img{width:100%;height:100%;object-fit:cover;}
.upload-area{border:2px dashed #e5e5e0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;}
.upload-area:hover{border-color:#1a5fa8;}
.upload-area input{display:none;}
.pasif-banner{background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;}
.dosya-satir{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f0f0ea;gap:8px;}
.dosya-satir:last-child{border-bottom:none;}
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;padding:12px;}
.foto-thumb{width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;border:1px solid #e5e5e0;cursor:pointer;}

/* ===== SIDEBAR ===== */
body{display:flex;}
.sidebar{width:220px;min-width:220px;background:#0a1628;color:#fff;display:flex;flex-direction:column;min-height:100vh;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sb-brand-logo{font-size:20px;font-weight:800;letter-spacing:3px;color:#fff;}
.sb-brand-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.sb-user{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:#1e5bac;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.sb-user-info{min-width:0;}
.sb-user-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-role{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;}
.sb-stats{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.08);display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sb-stat{background:rgba(255,255,255,0.06);border-radius:8px;padding:8px 10px;}
.sb-stat-num{font-size:18px;font-weight:800;color:#fff;line-height:1;}
.sb-stat-num.red{color:#f87171;}
.sb-stat-num.amber{color:#fbbf24;}
.sb-stat-num.green{color:#34d399;}
.sb-stat-label{font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.sb-nav{flex:1;padding:10px 0;}
.sb-nav-section{padding:10px 18px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:1px;}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:13px;border-left:3px solid transparent;transition:all .15s;}
.sb-nav-item:hover{background:rgba(255,255,255,0.07);color:#fff;}
.sb-nav-item.active{background:rgba(255,255,255,0.1);color:#fff;border-left-color:#2979cc;}
.sb-nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.sb-badge{margin-left:auto;background:#dc2626;color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:1px 6px;min-width:16px;text-align:center;}
.sb-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);font-size:11px;color:rgba(255,255,255,0.25);text-align:center;}
/* Ana içerik sidebar ile birlikte */
.main-wrap{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:50;}

/* ===== TOPLANTI ===== */
.toplanti-kart{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:18px;margin-bottom:12px;}
.toplanti-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.toplanti-tarih{font-size:13px;font-weight:700;color:#1a1a18;}
.toplanti-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.toplanti-body{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.toplanti-section{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.toplanti-list{list-style:none;padding:0;}
.toplanti-list li{font-size:13px;color:#1a1a18;padding:4px 0;border-bottom:1px solid #f5f5f0;display:flex;align-items:center;gap:6px;}
.toplanti-list li:last-child{border-bottom:none;}
.toplanti-list li::before{content:"•";color:#1a5fa8;font-weight:700;flex-shrink:0;}
.toplanti-kararlar{grid-column:1/-1;}
.toplanti-empty{text-align:center;padding:40px 20px;color:#aaa;}
.gundem-satir{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.gundem-satir input{flex:1;padding:7px 10px;border:1px solid #e5e5e0;border-radius:6px;font-size:13px;font-family:inherit;}
.gundem-satir button{padding:5px 10px;border:1px solid #e5e5e0;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#888;}
.gundem-satir button:hover{background:#fef2f2;color:#991b1b;border-color:#fecaca;}
.katilimci-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.katilimci-chip{display:flex;align-items:center;gap:5px;background:#eff6ff;color:#1e40af;border-radius:99px;padding:3px 10px;font-size:12px;}
.katilimci-chip button{background:none;border:none;cursor:pointer;color:#93c5fd;font-size:13px;line-height:1;padding:0;}
.katilimci-chip button:hover{color:#991b1b;}
.sonraki-tarih-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:10px;}
.sonraki-tarih-box .label{font-size:11px;color:#166534;font-weight:700;text-transform:uppercase;}
.sonraki-tarih-box .val{font-size:14px;font-weight:700;color:#15803d;}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-brand-logo">HSETR</div>
    <div class="sb-brand-sub">ISG Yönetim Sistemi</div>
  </div>
  <div class="sb-user">
    <div class="sb-avatar" id="sb-avatar">A</div>
    <div class="sb-user-info">
      <div class="sb-user-name" id="sb-user-name">ISG Uzmanı</div>
      <div class="sb-user-role">Yönetici</div>
    </div>
  </div>
  <div class="sb-stats" id="sb-stats">
    <div class="sb-stat">
      <div class="sb-stat-num red" id="sb-exp">0</div>
      <div class="sb-stat-label">Geçmiş</div>
    </div>
    <div class="sb-stat">
      <div class="sb-stat-num amber" id="sb-son">0</div>
      <div class="sb-stat-label">Yakında</div>
    </div>
    <div class="sb-stat">
      <div class="sb-stat-num green" id="sb-ok">0</div>
      <div class="sb-stat-label">Geçerli</div>
    </div>

  <nav class="sb-nav">
    <div class="sb-nav-section">Menü</div>
    <div class="sb-nav-item active" id="nav-home" onclick="goHome()">
      <span class="sb-nav-icon">&#127970;</span> İşyerleri
    </div>

      <span class="sb-nav-icon">&#128276;</span> Bildirimler
      <span class="sb-badge hidden" id="ndot">0</span>
    </div>
  </nav>
  <div class="sb-footer">HSETR ISG v2.0</div>
</div>

<div class="main-wrap">
<div class="topbar">
  <div class="topbar-left">
    <h1 style="display:none">ISG Takip</h1>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="topbar-btns">
    <button class="btn btn-primary" id="add-btn" onclick="handleAdd()">+ Ekle</button>
  </div>
</div>
<div class="container" id="main"></div>
</div>
<div class="overlay hidden" id="ov">
  <div class="modal">
    <h2 id="mtitle"></h2>
    <div id="mbody"></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal()">\u0130ptal</button>
      <button class="btn btn-primary" id="save-btn" onclick="save()">Kaydet</button>
    </div>
  </div>
</div>
<div class="overlay hidden" id="nov">
  <div class="npanel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h2 style="margin:0">Bildirimler <span id="ncnt" style="font-size:13px;font-weight:400;color:#aaa"></span></h2>
      <div style="display:flex;gap:6px">
        <button class="ibtn" onclick="tumunuOkundu()">T\u00fcm\u00fcn\u00fc Okundu</button>
        <button class="ibtn del" onclick="okunanSil()">Okunanlar\u0131 Sil</button>
      </div>
    </div>
    <div id="nlist"></div>
    <div class="mfooter"><button class="btn" onclick="document.getElementById('nov').classList.add('hidden')">Kapat</button></div>
  </div>
</div>
<script>
var SURELER={az:{risk:1825,acil:1460,yangin:365,yillik_egitim:365,yillik_calisma:365,isg_egitim:1095,saglik:1825,ilkyardim:1095,mesleki:1825},teh:{risk:1460,acil:1460,yangin:365,yillik_egitim:365,yillik_calisma:365,isg_egitim:730,saglik:1095,ilkyardim:1095,mesleki:1825},cok:{risk:730,acil:730,yangin:365,yillik_egitim:365,yillik_calisma:365,isg_egitim:365,saglik:365,ilkyardim:1095,mesleki:1825}};
var FIRMA_MEVZUAT=[{key:'risk',label:'Risk Analizi'},{key:'acil',label:'Acil Durum Plani'},{key:'yangin',label:'Yangin Tatbikati'},{key:'yillik_egitim',label:'Yillik Egitim Plani'},{key:'yillik_calisma',label:'Yillik Calisma Plani'}];
var PERS_MEVZUAT=[{key:'ilkyardim',label:'Ilk Yardim Egitimi'},{key:'mesleki',label:'Mesleki Yeterlilik'}];
var ACIL_KURAL={az:{yangin:50,koruma:50,kurtarma:50,ilkyardim:20},teh:{yangin:40,koruma:40,kurtarma:40,ilkyardim:15},cok:{yangin:30,koruma:30,kurtarma:30,ilkyardim:10}};
var ACIL_EKIP=[{key:'yangin',label:'Yangin Ekibi'},{key:'koruma',label:'Koruma Ekibi'},{key:'kurtarma',label:'Kurtarma Ekibi'},{key:'ilkyardim',label:'Ilk Yardim Ekibi'}];
var TS_LABEL={az:'Az Tehlikeli',teh:'Tehlikeli',cok:'Cok Tehlikeli'};
var TS_CLASS={az:'ts-az',teh:'ts-teh',cok:'ts-cok'};
var PERIYOT=[{v:30,l:'1 Ay'},{v:60,l:'2 Ay'},{v:90,l:'3 Ay'},{v:120,l:'4 Ay'},{v:150,l:'5 Ay'},{v:180,l:'6 Ay'},{v:210,l:'7 Ay'},{v:240,l:'8 Ay'},{v:270,l:'9 Ay'},{v:300,l:'10 Ay'},{v:330,l:'11 Ay'},{v:365,l:'12 Ay'}];

var today=new Date();today.setHours(0,0,0,0);
function addD(d,n){if(!d)return'';var r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);}
function fmt(d){return d?new Date(d).toLocaleDateString('tr-TR'):'\u2014';}
function dif(d){return d?Math.floor((new Date(d)-today)/86400000):9999;}
function st(d){if(!d)return'gray';var v=dif(d);return v<0?'red':v<=30?'amber':'green';}
function worst(a){var f=a.filter(function(x){return x!=='gray';});if(!f.length)return'gray';if(f.indexOf('red')>=0)return'red';if(f.indexOf('amber')>=0)return'amber';return'green';}
function lbl(s){return s==='red'?'Suresi Gecmis':s==='amber'?'30 Gun Icinde':s==='gray'?'Girilmedi':'Gecerli';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function ini(ad){return ad.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function gerekliE(ts,key,sayi){return Math.max(1,Math.ceil(sayi/(ACIL_KURAL[ts][key]||50)));}
function mevcutE(fid,key){return personeller.filter(function(p){return p.fid===fid&&p.aktif&&(p.acilEkipler||[]).indexOf(key)>=0;}).length;}
function perIsg(p){var f=firmalar.find(function(x){return x.id===p.fid;});return(f&&p.isg_tarih)?addD(p.isg_tarih,SURELER[f.ts].isg_egitim):'';}
function perSaglik(p){var f=firmalar.find(function(x){return x.id===p.fid;});return(f&&p.saglik_tarih)?addD(p.saglik_tarih,SURELER[f.ts].saglik):'';}
function ekipBit(e){return(e.sonBakim&&e.periyot)?addD(e.sonBakim,e.periyot):'';}
function fIcon(t){return t==='pdf'?'\ud83d\udcc4':t==='png'||t==='jpg'||t==='jpeg'?'\ud83d\uddbc':'\ud83d\udcce';}
function avHtml(p,lg){
  var cls=lg?'avatar-lg':'avatar';
  if(p.foto)return '<div class="'+cls+'"><img src="'+p.foto+'"/></div>';
  return '<div class="'+cls+'">'+ini(p.ad)+'</div>';
}
function ekHtml(e){
  if(e.fotolar&&e.fotolar.length)return '<div class="ekip-foto"><img src="'+e.fotolar[0]+'"/></div>';
  return '<div class="ekip-foto">&#9881;</div>';
}

function renderPListesi(f){
  document.getElementById('add-btn').textContent='+ Personel Ekle';
  var psA=personeller.filter(function(p){return p.fid===f.id&&p.aktif;});
  var bl=f.bolumler||[];

    +'<button class="bolum-chip '+(curBolum==='hepsi'?'active':'')+'" onclick="setCurBolum(\'hepsi\')">Tumu ('+psA.length+')</button>';
  bl.forEach(function(b){var c=psA.filter(function(p){return p.bolum===b;}).length;h+='<button class="bolum-chip '+(curBolum===b?'active':'')+'" onclick="setCurBolum(\''+b+'\')">'+b+' ('+c+')</button>';});
  var atan=psA.filter(function(p){return !p.bolum||bl.indexOf(p.bolum)<0;});
  if(atan.length)h+='<button class="bolum-chip '+(curBolum==='diger'?'active':'')+'" onclick="setCurBolum(\'diger\')">Atanmamis</button>';
  h+='</div>';
  var filtre=psA;
  if(curBolum==='diger')filtre=atan;
  else if(curBolum!=='hepsi')filtre=psA.filter(function(p){return p.bolum===curBolum;});
  if(!filtre.length){return h+'<div class="card"><div class="empty-state"><p>'+(psA.length?'Bu bolumde personel yok.':'Henuz personel yok.')+'</p>'+(psA.length?'':'<br><button class="btn btn-primary" onclick="openPersonelModal()">+ Ekle</button>')+'</div></div>';}
  if(curBolum==='hepsi'&&bl.length>0){
    var gruplar={};
    filtre.forEach(function(p){var b=(p.bolum&&bl.indexOf(p.bolum)>=0)?p.bolum:'Atanmamis';if(!gruplar[b])gruplar[b]=[];gruplar[b].push(p);});
    var sira=bl.slice();if(gruplar['Atanmamis'])sira.push('Atanmamis');
    h+='<div class="card">';
    sira.forEach(function(ba){

function pSatir(p,showB){
  var ib=perIsg(p);var sb=perSaglik(p);
  var ov=worst([st(ib),st(sb)].concat(p.belgeler.map(function(b){return st(b.bitis);})));
  return '<tr style="cursor:pointer" onclick="goPersonel(\''+p.id+'\')">'
    +'<td>'+avHtml(p,false)+'</td><td style="font-weight:600">'+p.ad+'</td>'
    +(showB?'<td><span class="badge badge-purple">'+(p.bolum||'\u2014')+'</span></td>':'')
    +'<td style="color:#888;font-size:12px">'+(p.gorev||'\u2014')+'</td>'
    +'<td><span class="badge badge-'+st(ib)+'">'+(fmt(ib)||'Girilmedi')+'</span></td>'
    +'<td><span class="badge badge-'+st(sb)+'">'+(fmt(sb)||'Girilmedi')+'</span></td>'
    +'<td><span class="badge badge-'+ov+'">'+lbl(ov)+'</span></td>'
    +'<td onclick="event.stopPropagation()"><div class="ibtns"><button class="ibtn" onclick="goPersonel(\''+p.id+'\')">Detay</button><button class="ibtn" onclick="openPersonelModal(\''+p.id+'\')">Duzenle</button><button class="ibtn warn" onclick="istenCikar(\''+p.id+'\')">Cikis</button><button class="ibtn del" onclick="delPersonel(\''+p.id+'\')">Sil</button></div></td></tr>';

// STATS & B\u0130LD\u0130R\u0130M
function globalStats(){
  var exp=0,son=0,ok=0;
  firmalar.forEach(function(f){
    f.belgeler.forEach(function(b){var s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
    (f.ekipmanlar||[]).forEach(function(e){var s=st(ekipBit(e));if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
  });
  personeller.filter(function(p){return p.aktif;}).forEach(function(p){
    [perIsg(p),perSaglik(p)].forEach(function(d){var s=st(d);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
    p.belgeler.forEach(function(b){var s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else if(s==='green')ok++;});
  });
  return{exp:exp,son:son,ok:ok};
}
function getAlerts(){
  var a=[];
  firmalar.forEach(function(f){
    f.belgeler.forEach(function(b){var s=st(b.bitis);if(s==='red'||s==='amber')a.push({id:'fb_'+f.id+'_'+b.id,type:s,name:f.ad,cat:'Firma',evrak:b.ad,tarih:b.bitis,dif:dif(b.bitis)});});
    (f.ekipmanlar||[]).forEach(function(e){var bit=ekipBit(e);var s=st(bit);if(s==='red'||s==='amber')a.push({id:'eb_'+e.id,type:s,name:e.ad,cat:'Ekipman',sub:f.ad,evrak:'Periyodik Bakim',tarih:bit,dif:dif(bit)});});
  });
  personeller.filter(function(p){return p.aktif;}).forEach(function(p){
    var f=firmalar.find(function(x){return x.id===p.fid;});
    var checks=[{evrak:'ISG Egitimi',tarih:perIsg(p)},{evrak:'Saglik Raporu',tarih:perSaglik(p)}].concat(p.belgeler.map(function(b){return{evrak:b.ad,tarih:b.bitis};}));
    checks.forEach(function(c,i){var s=st(c.tarih);if(s==='red'||s==='amber')a.push({id:'pb_'+p.id+'_'+i,type:s,name:p.ad,cat:'Personel',sub:f?f.ad:'',evrak:c.evrak,tarih:c.tarih,dif:dif(c.tarih)});});
  });
  return a.sort(function(a,b){return a.dif-b.dif;});
}
function updateBadge(){
  var n=getAlerts().filter(function(a){return okunan.indexOf(a.id)<0;}).length;
  var d=document.getElementById('ndot');
  if(n>0){d.textContent=n;d.classList.remove('hidden');}else d.classList.add('hidden');
}
function openNotif(){
  var alerts=getAlerts();
  document.getElementById('ncnt').textContent=alerts.length?'('+alerts.length+' uyari)':'';

function renderNotifList(alerts){
  var h='';

  else alerts.forEach(function(a){
    var isOk=okunan.indexOf(a.id)>=0;
    var desc=a.dif<0?(Math.abs(a.dif)+' gun once sona erdi'):(a.dif+' gun icinde sona erecek');
    h+='<div class="nitem '+(isOk?'read':'')+'"><div class="navt '+a.type+'">'+ini(a.name)+'</div>'
      +'<div class="nbody"><div class="nname">'+a.name+(a.sub?' <span style="font-weight:400;color:#aaa;font-size:11px">('+a.sub+')</span>':'')+'</div>'
      +'<div class="ndesc">'+a.evrak+' &middot; '+a.cat+'</div>'
      +'<div class="ndate">'+fmt(a.tarih)+' &middot; '+desc+'</div></div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">'
      +'<span class="badge badge-'+a.type+'">'+(a.type==='red'?'Gecmis':'Yakin')+'</span>'
      +'<button class="ibtn" style="font-size:10px" onclick="notifOkundu(\''+a.id+'\')">'+(isOk?'Okundu \u2713':'Okundu')+'</button>'
      +'<button class="ibtn del" style="font-size:10px" onclick="notifSil(\''+a.id+'\')">Sil</button>'
      +'</div></div>';
  });
  document.getElementById('nlist').innerHTML=h;
}
function notifOkundu(id){if(okunan.indexOf(id)<0)okunan.push(id);updateBadge();renderNotifList(getAlerts());}
function notifSil(id){if(okunan.indexOf(id)<0)okunan.push(id);updateBadge();renderNotifList(getAlerts().filter(function(a){return okunan.indexOf(a.id)<0;}));}

function istenCikar(pid){

function onBDosyaSec(input,fid,bid){
  var file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('5MB dan buyuk olamaz!');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var f=firmalar.find(function(x){return x.id===fid;});var b=f.belgeler.find(function(x){return x.id===bid;});
    if(!b.pdfler)b.pdfler=[];
    var tip=file.name.split('.').pop().toLowerCase();
    b.pdfler.push({id:uid(),ad:file.name,tip:tip,veri:e.target.result});
    openBelgeDosya(fid,bid);
  };reader.readAsDataURL(file);
}

  if(!cikanlar.length) return '<div class="card"><div class="empty-state"><p>Bu firmada isten cikan personel yok.</p></div></div>';
  var h='<div class="card"><table>';
  h+='<thead><tr><th></th><th>Ad Soyad</th><th>TC</th><th>Gorevi</th><th>Ise Giris</th><th>Cikis Tarihi</th><th></th></tr></thead><tbody>';
  cikanlar.forEach(function(p){
    var ini=p.ad.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
    h+='<tr>';
    h+='<td><div class="avatar">'+ini+'</div></td>';
    h+='<td style="font-weight:600">'+p.ad+'</td>';
    h+='<td style="color:#aaa;font-size:11px">'+(p.tc?p.tc.slice(0,3)+'****'+p.tc.slice(-4):'--')+'</td>';
    h+='<td style="color:#888">'+(p.gorev||'--')+'</td>';
    h+='<td style="color:#888;font-size:12px">'+fmt(p.ise_giris)+'</td>';
    h+='<td><span class="badge badge-gray">'+fmt(p.cikis_tarihi)+'</span></td>';
    h+='<td><div class="ibtns">';
    h+='<button class="ibtn" data-pid="'+p.id+'" onclick="geriAl(this.dataset.pid)">Geri Al</button>';
    h+='<button class="ibtn del" data-pid="'+p.id+'" onclick="delPersonel(this.dataset.pid)">Sil</button>';
    h+='</div></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function renderToplantiListesi(f){
  document.getElementById('add-btn').textContent='+ Toplanti Ekle';
  var tl=f.toplantilar||[];
  if(!tl.length) return '<div class="card"><div class="toplanti-empty"><p style="font-size:14px;font-weight:600;margin-bottom:8px">Henuz toplanti kaydi yok.</p><p style="font-size:13px;color:#aaa;margin-bottom:16px">ISG Kurul toplantilarini buradan kayit altina alabilirsiniz.</p><button class="btn btn-primary" onclick="openToplantiModal()">+ Ilk Toplantiyi Ekle</button></div></div>';
  var sorted=tl.slice().sort(function(a,b){return new Date(b.tarih)-new Date(a.tarih);});
  var h='<div style="display:flex;flex-direction:column;gap:12px">';
  sorted.forEach(function(t){
    var katStr=(t.katilimcilar||[]).map(function(k){return '<li style="font-size:13px;padding:2px 0">'+k+'</li>';}).join('');
    var gunStr=(t.gundem||[]).map(function(g,i){return '<li style="font-size:13px;padding:2px 0"><strong>'+(i+1)+'.</strong> '+g+'</li>';}).join('');
    var karStr=(t.kararlar||[]).map(function(k){return '<li style="font-size:13px;padding:2px 0">'+k+'</li>';}).join('');
    h+='<div class="toplanti-kart">';
    h+='<div class="toplanti-header">';
    h+='<div>';
    h+='<div class="toplanti-tarih">'+fmt(t.tarih)+' — '+t.baslik+'</div>';
    h+='<div class="toplanti-badges">';
    h+='<span class="badge badge-blue">'+((t.katilimcilar||[]).length)+' Katilimci</span>';
    h+='<span class="badge badge-gray">'+((t.gundem||[]).length)+' Gundem Maddesi</span>';
    if(t.sonraki) h+='<span class="badge badge-green">Sonraki: '+fmt(t.sonraki)+'</span>';
    h+='</div></div>';
    h+='<div class="ibtns">';
    h+='<button class="ibtn" data-tid="'+t.id+'" onclick="openToplantiModal(this.dataset.tid)">Duzenle</button>';
    h+='<button class="ibtn del" data-fid="'+f.id+'" data-tid="'+t.id+'" onclick="delToplanti(this.dataset.fid,this.dataset.tid)">Sil</button>';
    h+='</div></div>';
    h+='<div class="toplanti-body">';
    if(gunStr) h+='<div class="toplanti-section"><div class="toplanti-section-title">Gundem Maddeleri</div><ul style="list-style:none;padding:0">'+gunStr+'</ul></div>';
    if(katStr) h+='<div class="toplanti-section"><div class="toplanti-section-title">Katilimcilar</div><ul style="list-style:none;padding:0">'+katStr+'</ul></div>';
    if(karStr) h+='<div class="toplanti-section"><div class="toplanti-section-title">Alinan Kararlar</div><ul style="list-style:none;padding:0">'+karStr+'</ul></div>';
    if((t.dosyalar||[]).length){
      h+='<div class="toplanti-section"><div class="toplanti-section-title">Ekler</div>';
      (t.dosyalar||[]).forEach(function(d,i){
        h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0ea">';
        h+='<span style="font-size:13px">'+d.ad+'</span>';
        h+='<button class="ibtn" data-fid="'+f.id+'" data-tid="'+t.id+'" data-idx="'+i+'" onclick="toplantiBelgeIndir(this.dataset.fid,this.dataset.tid,this.dataset.idx)">Indir</button>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function openToplantiModal(tidOrEl){
  var tid=typeof tidOrEl==='string'?tidOrEl:(tidOrEl&&tidOrEl.dataset?tidOrEl.dataset.id:null)||null;
  var f=firmalar.find(function(x){return x.id===curFirmaId;});
  toplantiEditId=tid||null;
  var t=tid?(f.toplantilar||[]).find(function(x){return x.id===tid;}):null;

  // Init lists
  gundemListesi=t?(t.gundem||[]).slice():[];
  kararListesi=t?(t.kararlar||[]).slice():[];
  katilimciListesi=t?(t.katilimcilar||[]).slice():[];

  var psListesi=personeller.filter(function(p){return p.fid===curFirmaId&&p.aktif!==false;});

  document.getElementById('mtitle').textContent=tid?'Toplantıyı Düzenle':'Yeni Toplantı Kaydı';
  document.getElementById('mbody').innerHTML=
    '<div class="frow"><label>Toplantı Başlığı</label><input id="top-baslik" value="'+(t?t.baslik:'')+'" placeholder="ISG Kurul Toplantısı - Ocak 2025"/></div>'
    +'<div class="frow"><label>Toplantı Tarihi</label><input id="top-tarih" type="date" value="'+(t?t.tarih:'')+'"/></div>'

    +'<div class="frow"><label>Gündem Maddeleri</label>'
    +'<div id="gundem-container"></div>'
    +'<button class="ibtn" style="margin-top:6px" onclick="gundemEkle()">+ Madde Ekle</button>'
    +'</div>'

    +'<div class="frow"><label>Katılımcılar</label>'
    +'<div id="katilimci-chips"></div>'
    +'<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">'
    +'<select id="kat-sec" style="flex:1;padding:7px 10px;border:1px solid #e5e5e0;border-radius:6px;font-size:13px;font-family:inherit"><option value="">-- Personel Seç --</option>'
    +psListesi.map(function(p){return '<option value="'+p.ad+'">'+p.ad+'</option>';}).join('')
    +'</select>'
    +'<button class="ibtn" onclick="katilimciEkleSecim()">Ekle</button>'
    +'</div>'
    +'<div style="display:flex;gap:6px;margin-top:6px">'
    +'<input id="kat-elle" placeholder="Elle isim yaz..." style="flex:1;padding:7px 10px;border:1px solid #e5e5e0;border-radius:6px;font-size:13px;font-family:inherit"/>'
    +'<button class="ibtn" onclick="katilimciEkleElle()">Ekle</button>'
    +'</div>'
    +'</div>'

    +'<div class="frow"><label>Alınan Kararlar</label>'
    +'<div id="karar-container"></div>'
    +'<button class="ibtn" style="margin-top:6px" onclick="kararEkle()">+ Karar Ekle</button>'
    +'</div>'

    +'<div class="frow"><label>Bir Sonraki Toplantı Tarihi <span style="font-weight:400;color:#aaa">(opsiyonel)</span></label><input id="top-sonraki" type="date" value="'+(t?t.sonraki||'':'')+'"/></div>';

  document.getElementById('ov').classList.remove('hidden');
  renderGundemUI();
  renderKararUI();
  renderKatilimciUI();
}

function renderGundemUI(){
  var html='';
  gundemListesi.forEach(function(g,i){
    html+='<div class="gundem-satir"><input value="'+g+'" oninput="gundemListesi['+i+']=this.value" style="flex:1;padding:7px 10px;border:1px solid #e5e5e0;border-radius:6px;font-size:13px;font-family:inherit"/><button onclick="gundemSil('+i+')">✕</button></div>';
  });
  document.getElementById('gundem-container').innerHTML=html;
}
function gundemEkle(){gundemListesi.push('');renderGundemUI();setTimeout(function(){var inputs=document.querySelectorAll('#gundem-container input');if(inputs.length)inputs[inputs.length-1].focus();},50);}
function gundemSil(i){gundemListesi.splice(i,1);renderGundemUI();}

function renderKararUI(){
  var html='';
  kararListesi.forEach(function(k,i){
    html+='<div class="gundem-satir"><input value="'+k+'" oninput="kararListesi['+i+']=this.value" style="flex:1;padding:7px 10px;border:1px solid #e5e5e0;border-radius:6px;font-size:13px;font-family:inherit"/><button onclick="kararSil('+i+')">✕</button></div>';
  });
  document.getElementById('karar-container').innerHTML=html;
}
function kararEkle(){kararListesi.push('');renderKararUI();setTimeout(function(){var inputs=document.querySelectorAll('#karar-container input');if(inputs.length)inputs[inputs.length-1].focus();},50);}
function kararSil(i){kararListesi.splice(i,1);renderKararUI();}

function renderKatilimciUI(){
  var html=katilimciListesi.map(function(k,i){
    return '<span class="katilimci-chip">'+k+'<button onclick="katilimciSil('+i+')">✕</button></span>';
  }).join('');
  document.getElementById('katilimci-chips').innerHTML=html;
}
function katilimciEkleSecim(){var v=document.getElementById('kat-sec').value;if(!v||katilimciListesi.indexOf(v)>=0)return;katilimciListesi.push(v);renderKatilimciUI();document.getElementById('kat-sec').value='';}
function katilimciEkleElle(){var v=document.getElementById('kat-elle').value.trim();if(!v||katilimciListesi.indexOf(v)>=0)return;katilimciListesi.push(v);renderKatilimciUI();document.getElementById('kat-elle').value='';}
function katilimciSil(i){katilimciListesi.splice(i,1);renderKatilimciUI();}

function saveToplanti(){
  var f=firmalar.find(function(x){return x.id===curFirmaId;});if(!f)return;
  var baslik=document.getElementById('top-baslik').value.trim();
  var tarih=document.getElementById('top-tarih').value;
  if(!baslik||!tarih){alert('Başlık ve tarih zorunlu!');return;}
  var sonraki=document.getElementById('top-sonraki').value||null;
  var rec={
    id:toplantiEditId||uid(),
    baslik:baslik,
    tarih:tarih,
    gundem:gundemListesi.filter(function(g){return g.trim();}),
    katilimcilar:katilimciListesi,
    kararlar:kararListesi.filter(function(k){return k.trim();}),
    sonraki:sonraki
  };
  if(!f.toplantilar)f.toplantilar=[];
  if(toplantiEditId){var i=f.toplantilar.findIndex(function(x){return x.id===toplantiEditId;});f.toplantilar[i]=rec;}
  else f.toplantilar.push(rec);
  closeModal();
  renderFirma();
}

function delToplanti(fid,tid){
  if(!confirm('Bu toplantı kaydı silinsin mi?'))return;
  var f=firmalar.find(function(x){return x.id===fid;});
  if(f)f.toplantilar=(f.toplantilar||[]).filter(function(x){return x.id!==tid;});
  renderFirma();
}

</script>
</body>
</html>
