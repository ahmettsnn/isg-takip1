<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISG Takip Sistemi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar h1{font-size:16px;font-weight:700;}
.breadcrumb{font-size:13px;color:#aaa;display:flex;align-items:center;gap:6px;}
.breadcrumb .bc-link{cursor:pointer;color:#1a5fa8;}
.breadcrumb .bc-link:hover{text-decoration:underline;}
.topbar-btns{display:flex;gap:8px;}
.btn{padding:7px 14px;font-size:13px;cursor:pointer;border-radius:8px;font-family:inherit;border:1px solid #e5e5e0;background:#fff;color:#1a1a18;white-space:nowrap;}
.btn:hover{background:#f0f0ea;}
.btn-primary{background:#1a5fa8;color:#fff;border-color:#1a5fa8;}
.btn-primary:hover{background:#154d8a;}
.btn-notif{position:relative;}
.ndot{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:#dc2626;border-radius:50%;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.container{max-width:1100px;margin:0 auto;padding:20px 16px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.stat{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-size:24px;font-weight:700;}
.stat-label{font-size:11px;color:#888;margin-top:3px;}
.c-red{color:#dc2626;}.c-amber{color:#d97706;}.c-green{color:#16a34a;}.c-blue{color:#1a5fa8;}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 16px;border-bottom:1px solid #f0f0ea;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:15px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 12px;color:#888;font-weight:600;border-bottom:1px solid #e5e5e0;font-size:11px;white-space:nowrap;background:#fafaf8;}
tbody tr{border-bottom:1px solid #f0f0ea;}
tbody tr:hover{background:#fafaf8;}
tbody td{padding:10px 12px;}
.ibtns{display:flex;gap:4px;}
.ibtn{padding:3px 9px;font-size:11px;cursor:pointer;border-radius:6px;font-family:inherit;border:1px solid #e5e5e0;background:transparent;color:#666;}
.ibtn:hover{background:#f0f0ea;}
.ibtn.del:hover{background:#fef2f2;color:#991b1b;border-color:#fecaca;}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-red{background:#fef2f2;color:#991b1b;}
.badge-amber{background:#fffbeb;color:#92400e;}
.badge-green{background:#f0fdf4;color:#166534;}
.badge-blue{background:#eff6ff;color:#1e40af;}
.badge-gray{background:#f3f4f6;color:#4b5563;}
.ts-az{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
.ts-teh{background:#fffbeb;color:#92400e;border:1px solid #fde68a;}
.ts-cok{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
.inner-tabs{display:flex;gap:0;border-bottom:2px solid #f0f0ea;margin-bottom:20px;}
.itab{padding:10px 20px;font-size:14px;cursor:pointer;background:transparent;border:none;color:#888;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;}
.itab.active{color:#1a5fa8;border-bottom-color:#1a5fa8;font-weight:600;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.info-item label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:4px;text-transform:uppercase;}
.info-item .val{font-size:14px;font-weight:500;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.modal h2{font-size:17px;font-weight:600;margin-bottom:18px;}
.frow{margin-bottom:13px;}
.frow label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500;}
.frow input,.frow select{width:100%;padding:8px 11px;border:1px solid #e5e5e0;border-radius:8px;font-size:13px;font-family:inherit;}
.frow input:focus,.frow select:focus{outline:none;border-color:#1a5fa8;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.hidden{display:none!important;}
.section-title{font-size:11px;font-weight:700;color:#aaa;margin:16px 0 10px;text-transform:uppercase;letter-spacing:.6px;}
.hint{font-size:11px;color:#aaa;margin-top:4px;}
.npanel{background:#fff;border-radius:14px;padding:24px;width:92%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.npanel h2{font-size:17px;font-weight:600;margin-bottom:14px;}
.nitem{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0ea;}
.nitem:last-child{border-bottom:none;}
.navt{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;}
.navt.red{background:#fef2f2;color:#991b1b;}
.navt.amber{background:#fffbeb;color:#92400e;}
.nbody{flex:1;}
.nname{font-size:13px;font-weight:600;}
.ndesc{font-size:12px;color:#888;margin-top:2px;}
.ndate{font-size:11px;color:#bbb;margin-top:2px;}
.empty-state{text-align:center;padding:40px 20px;color:#aaa;}
.mevzuat-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;font-size:12px;color:#1e40af;margin-bottom:14px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>ISG Takip</h1>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="topbar-btns">
    <button class="btn btn-notif" onclick="openNotif()">
      Bildirimler
      <span class="ndot hidden" id="ndot">0</span>
    </button>
    <button class="btn btn-primary" id="add-btn" onclick="handleAdd()">+ Ekle</button>
  </div>
</div>

<div class="container" id="main"></div>

<!-- MODAL -->
<div class="overlay hidden" id="ov">
  <div class="modal">
    <h2 id="mtitle"></h2>
    <div id="mbody"></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="save()">Kaydet</button>
    </div>
  </div>
</div>

<!-- BİLDİRİM -->
<div class="overlay hidden" id="nov">
  <div class="npanel">
    <h2>Bildirimler <span id="ncnt" style="font-size:13px;font-weight:400;color:#aaa"></span></h2>
    <div id="nlist"></div>
    <div class="mfooter"><button class="btn" onclick="document.getElementById('nov').classList.add('hidden')">Kapat</button></div>
  </div>
</div>

<script>
// ============================================================
// YASAL SÜRELER (tehlike sınıfına göre, gün olarak)
// ============================================================
const SURELER = {
  az:  {risk:5*365, acil:4*365, yangin:365, isg_egitim:3*365, yillik_egitim:365, yillik_calisma:365, saglik:5*365, ilkyardim:3*365, mesleki:5*365},
  teh: {risk:4*365, acil:4*365, yangin:365, isg_egitim:2*365, yillik_egitim:365, yillik_calisma:365, saglik:3*365, ilkyardim:3*365, mesleki:5*365},
  cok: {risk:2*365, acil:2*365, yangin:365, isg_egitim:365,   yillik_egitim:365, yillik_calisma:365, saglik:365,   ilkyardim:3*365, mesleki:5*365},
};

// Mevzuata göre otomatik süre hesaplanan belgeler
const MEVZUAT_BELGELER = [
  {key:'risk',        label:'Risk Analizi',           aciklama:'Tehlike sınıfına göre otomatik hesaplanır'},
  {key:'acil',        label:'Acil Durum Planı',        aciklama:'Tehlike sınıfına göre otomatik hesaplanır'},
  {key:'yangin',      label:'Yangın Tatbikatı',        aciklama:'Her yıl yenilenir (mevzuat)'},
  {key:'yillik_egitim', label:'Yıllık Eğitim Planı',  aciklama:'Her yıl yenilenir (mevzuat)'},
  {key:'yillik_calisma',label:'Yıllık Çalışma Planı', aciklama:'Her yıl yenilenir (mevzuat)'},
];

const TS_LABEL={az:'Az Tehlikeli',teh:'Tehlikeli',cok:'Çok Tehlikeli'};
const TS_CLASS={az:'ts-az',teh:'ts-teh',cok:'ts-cok'};

const today=new Date();today.setHours(0,0,0,0);
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);};
const fmt=d=>d?new Date(d).toLocaleDateString('tr-TR'):'—';
const diff=d=>d?Math.floor((new Date(d)-today)/86400000):9999;
const st=d=>{if(!d)return'green';const v=diff(d);return v<0?'red':v<=30?'amber':'green';};
const worst=a=>a.includes('red')?'red':a.includes('amber')?'amber':'green';
const lbl=s=>s==='red'?'Süresi Geçmiş':s==='amber'?'30 Gün İçinde':'Geçerli';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// ============================================================
// VERİ
// ============================================================
let firmalar=[
  {id:'f1',ad:'ABC İnşaat Ltd.',nace:'4120',ts:'cok',vergi:'1234567890',sgk:'123456',adres:'İstanbul / Kadıköy',
   belgeler:[
     {id:'b1',ad:'Risk Analizi',tip:'mevzuat',key:'risk',hazirlik:addD(today,-400),bitis:addD(today,-20)},
     {id:'b2',ad:'Acil Durum Planı',tip:'mevzuat',key:'acil',hazirlik:addD(today,-10),bitis:addD(today,25)},
     {id:'b3',ad:'Yangın Tatbikatı',tip:'mevzuat',key:'yangin',hazirlik:addD(today,-60),bitis:addD(today,300)},
     {id:'b4',ad:'SGK Borcu Yoktur',tip:'manuel',sure:90,hazirlik:addD(today,-20),bitis:addD(today,70)},
     {id:'b5',ad:'Vergi Borcu Yoktur',tip:'manuel',sure:90,hazirlik:addD(today,-30),bitis:addD(today,60)},
   ]},
  {id:'f2',ad:'XYZ Büro Hizmetleri',nace:'8211',ts:'az',vergi:'9876543210',sgk:'654321',adres:'Ankara / Çankaya',
   belgeler:[
     {id:'b6',ad:'Risk Analizi',tip:'mevzuat',key:'risk',hazirlik:addD(today,-200),bitis:addD(today,180)},
     {id:'b7',ad:'Yıllık Çalışma Planı',tip:'mevzuat',key:'yillik_calisma',hazirlik:addD(today,-5),bitis:addD(today,360)},
     {id:'b8',ad:'SGK Borcu Yoktur',tip:'manuel',sure:90,hazirlik:addD(today,-10),bitis:addD(today,80)},
   ]},
  {id:'f3',ad:'Güven Kimya A.Ş.',nace:'2011',ts:'cok',vergi:'1122334455',sgk:'112233',adres:'İzmir / Bornova',
   belgeler:[
     {id:'b9',ad:'Risk Analizi',tip:'mevzuat',key:'risk',hazirlik:addD(today,-700),bitis:addD(today,-30)},
     {id:'b10',ad:'Acil Durum Planı',tip:'mevzuat',key:'acil',hazirlik:addD(today,-5),bitis:addD(today,-5)},
   ]},
];

let personeller=[
  {id:'p1',fid:'f1',ad:'Ahmet Yılmaz',sicil:'P001',gorev:'Saha İşçisi',
   belgeler:[
     {id:'pb1',ad:'İSG Eğitimi',tip:'mevzuat',key:'isg_egitim',hazirlik:addD(today,-380),bitis:addD(today,-10)},
     {id:'pb2',ad:'Sağlık Raporu',tip:'mevzuat',key:'saglik',hazirlik:addD(today,-30),bitis:addD(today,120)},
     {id:'pb3',ad:'Mesleki Yeterlilik Belgesi',tip:'manuel',sure:5*365,hazirlik:addD(today,-100),bitis:addD(today,400)},
   ]},
  {id:'p2',fid:'f1',ad:'Fatma Kaya',sicil:'P002',gorev:'Kalıpçı',
   belgeler:[
     {id:'pb4',ad:'İSG Eğitimi',tip:'mevzuat',key:'isg_egitim',hazirlik:addD(today,-20),bitis:addD(today,20)},
     {id:'pb5',ad:'Sağlık Raporu',tip:'mevzuat',key:'saglik',hazirlik:addD(today,-380),bitis:addD(today,-5)},
   ]},
  {id:'p3',fid:'f2',ad:'Zeynep Arslan',sicil:'P003',gorev:'Muhasebeci',
   belgeler:[
     {id:'pb6',ad:'İSG Eğitimi',tip:'mevzuat',key:'isg_egitim',hazirlik:addD(today,-100),bitis:addD(today,400)},
     {id:'pb7',ad:'Sağlık Raporu',tip:'mevzuat',key:'saglik',hazirlik:addD(today,-200),bitis:addD(today,600)},
   ]},
  {id:'p4',fid:'f3',ad:'Ayşe Şahin',sicil:'P004',gorev:'Kimyager',
   belgeler:[
     {id:'pb8',ad:'İSG Eğitimi',tip:'mevzuat',key:'isg_egitim',hazirlik:addD(today,-370),bitis:addD(today,-5)},
     {id:'pb9',ad:'Sağlık Raporu',tip:'mevzuat',key:'saglik',hazirlik:addD(today,-10),bitis:addD(today,30)},
     {id:'pb10',ad:'İlk Yardım Eğitimi',tip:'mevzuat',key:'ilkyardim',hazirlik:addD(today,-20),bitis:addD(today,5)},
   ]},
];

// ============================================================
// DURUM
// ============================================================
let curView='home',curFirmaId=null,curTab='belgeler',editId=null,editType=null,editSubType=null;

// ============================================================
// RENDER
// ============================================================
function render(){curView==='home'?renderHome():renderFirma();}

function renderHome(){
  updateBreadcrumb([]);
  document.getElementById('add-btn').textContent='+ Firma Ekle';
  const gs=calcGlobalStats();
  let h=`<div class="stats">
    <div class="stat"><div class="stat-num c-red">${gs.exp}</div><div class="stat-label">Süresi Geçmiş</div></div>
    <div class="stat"><div class="stat-num c-amber">${gs.son}</div><div class="stat-label">30 Günde Doluyor</div></div>
    <div class="stat"><div class="stat-num c-green">${gs.ok}</div><div class="stat-label">Geçerli</div></div>
    <div class="stat"><div class="stat-num c-blue">${firmalar.length}</div><div class="stat-label">İşyeri</div></div>
    <div class="stat"><div class="stat-num" style="color:#1a1a18">${personeller.length}</div><div class="stat-label">Personel</div></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">İşyerleri</span></div>
    <table><thead><tr><th>İşyeri Adı</th><th>NACE</th><th>Tehlike Sınıfı</th><th>Personel</th><th>Belge Durumu</th><th></th></tr></thead><tbody>`;
  firmalar.forEach(f=>{
    const pc=personeller.filter(p=>p.fid===f.id).length;
    const bs=worst(f.belgeler.map(b=>st(b.bitis)));
    h+=`<tr style="cursor:pointer" onclick="goFirma('${f.id}')">
      <td style="font-weight:600">${f.ad}</td>
      <td style="color:#888">${f.nace||'—'}</td>
      <td><span class="badge ${TS_CLASS[f.ts]}">${TS_LABEL[f.ts]}</span></td>
      <td>${pc} kişi</td>
      <td><span class="badge badge-${bs}">${lbl(bs)}</span></td>
      <td onclick="event.stopPropagation()"><div class="ibtns">
        <button class="ibtn" onclick="openFirmaModal('${f.id}')">Düzenle</button>
        <button class="ibtn del" onclick="delFirma('${f.id}')">Sil</button>
      </div></td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById('main').innerHTML=h;
  updateBadge();
}

function renderFirma(){
  const f=firmalar.find(x=>x.id===curFirmaId);
  if(!f){goHome();return;}
  updateBreadcrumb([{label:f.ad}]);
  let h=`<div class="inner-tabs">
    <button class="itab ${curTab==='bilgiler'?'active':''}" onclick="switchTab('bilgiler')">Firma Bilgileri</button>
    <button class="itab ${curTab==='belgeler'?'active':''}" onclick="switchTab('belgeler')">Firma Belgeleri</button>
    <button class="itab ${curTab==='personeller'?'active':''}" onclick="switchTab('personeller')">Personeller</button>
  </div>`;
  if(curTab==='bilgiler') h+=renderBilgiler(f);
  else if(curTab==='belgeler') h+=renderFirmaBelgeler(f);
  else h+=renderPersoneller(f);
  document.getElementById('main').innerHTML=h;
  updateBadge();
}

function renderBilgiler(f){
  document.getElementById('add-btn').textContent='✎ Firma Bilgilerini Düzenle';
  return `<div class="card" style="padding:20px">
    <div class="info-grid">
      <div class="info-item"><label>Firma Adı</label><div class="val">${f.ad}</div></div>
      <div class="info-item"><label>Tehlike Sınıfı</label><div class="val"><span class="badge ${TS_CLASS[f.ts]}">${TS_LABEL[f.ts]}</span></div></div>
      <div class="info-item"><label>NACE Kodu</label><div class="val">${f.nace||'—'}</div></div>
      <div class="info-item"><label>Vergi Kimlik No</label><div class="val">${f.vergi||'—'}</div></div>
      <div class="info-item"><label>SGK Sicil No</label><div class="val">${f.sgk||'—'}</div></div>
      <div class="info-item"><label>Adres</label><div class="val">${f.adres||'—'}</div></div>
    </div>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f0f0ea;">
      <div class="section-title">Bu işyerinde mevzuata göre geçerlilik süreleri</div>
      <table style="font-size:12px;max-width:500px">
        <thead><tr><th>Evrak</th><th>Süre</th></tr></thead>
        <tbody>
          ${MEVZUAT_BELGELER.map(m=>`<tr><td>${m.label}</td><td>${(SURELER[f.ts][m.key]/365).toFixed(0)} yıl</td></tr>`).join('')}
          <tr><td>İSG Eğitimi (personel)</td><td>${(SURELER[f.ts].isg_egitim/365).toFixed(0)} yıl</td></tr>
          <tr><td>Sağlık Raporu (personel)</td><td>${(SURELER[f.ts].saglik/365).toFixed(0)} yıl</td></tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderFirmaBelgeler(f){
  document.getElementById('add-btn').textContent='+ Belge Ekle';
  if(!f.belgeler.length) return `<div class="card"><div class="empty-state"><p>Henüz belge yok.</p><br><button class="btn btn-primary" onclick="openBelgeModal()">+ İlk Belgeyi Ekle</button></div></div>`;
  let h=`<div class="card"><table>
    <thead><tr><th>Belge Adı</th><th>Tür</th><th>Hazırlanma</th><th>Bitiş Tarihi</th><th>Durum</th><th>Kalan</th><th></th></tr></thead><tbody>`;
  f.belgeler.forEach(b=>{
    const s=st(b.bitis);
    const d=diff(b.bitis);
    const kalanStr=d<0?`${Math.abs(d)} gün geçti`:`${d} gün kaldı`;
    const turBadge=b.tip==='mevzuat'?'<span class="badge badge-blue">Mevzuat</span>':'<span class="badge badge-gray">Manuel</span>';
    h+=`<tr>
      <td style="font-weight:600">${b.ad}</td>
      <td>${turBadge}</td>
      <td style="color:#888">${fmt(b.hazirlik)}</td>
      <td>${fmt(b.bitis)}</td>
      <td><span class="badge badge-${s}">${lbl(s)}</span></td>
      <td style="color:${s==='red'?'#dc2626':s==='amber'?'#d97706':'#16a34a'};font-weight:500;font-size:12px">${kalanStr}</td>
      <td><div class="ibtns">
        <button class="ibtn" onclick="openBelgeModal('${b.id}')">Düzenle</button>
        <button class="ibtn del" onclick="delBelge('${f.id}','${b.id}')">Sil</button>
      </div></td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function renderPersoneller(f){
  document.getElementById('add-btn').textContent='+ Personel Ekle';
  const ps=personeller.filter(p=>p.fid===f.id);
  if(!ps.length) return `<div class="card"><div class="empty-state"><p>Bu işyerinde henüz personel yok.</p><br><button class="btn btn-primary" onclick="openPersonelModal()">+ İlk Personeli Ekle</button></div></div>`;
  let h=`<div class="card"><table>
    <thead><tr><th>Ad Soyad</th><th>Sicil</th><th>Görev</th><th>Belge Durumu</th><th></th></tr></thead><tbody>`;
  ps.forEach(p=>{
    const ov=worst(p.belgeler.map(b=>st(b.bitis)));
    const expCount=p.belgeler.filter(b=>st(b.bitis)==='red').length;
    const sonCount=p.belgeler.filter(b=>st(b.bitis)==='amber').length;
    h+=`<tr style="cursor:pointer" onclick="goPersonel('${p.id}')">
      <td style="font-weight:600">${p.ad}</td>
      <td style="color:#aaa;font-size:11px">${p.sicil}</td>
      <td style="color:#888">${p.gorev||'—'}</td>
      <td>
        <span class="badge badge-${ov}">${lbl(ov)}</span>
        ${expCount?`<span style="font-size:11px;color:#dc2626;margin-left:6px">${expCount} geçmiş</span>`:''}
        ${sonCount?`<span style="font-size:11px;color:#d97706;margin-left:4px">${sonCount} yakın</span>`:''}
      </td>

function goPersonel(pid){

  if(!p||!f)return;
  curView='personel'; curFirmaId=f.id;
  updateBreadcrumb([{label:f.ad,fid:f.id},{label:p.ad}]);
  document.getElementById('add-btn').textContent='+ Belge Ekle';

  let h=`<div class="card" style="padding:16px;margin-bottom:16px">
    <div class="info-grid">
      <div class="info-item"><label>Ad Soyad</label><div class="val">${p.ad}</div></div>
      <div class="info-item"><label>Sicil No</label><div class="val">${p.sicil||'—'}</div></div>
      <div class="info-item"><label>Görevi</label><div class="val">${p.gorev||'—'}</div></div>
      <div class="info-item"><label>İşyeri</label><div class="val">${f.ad} <span class="badge ${TS_CLASS[f.ts]}" style="margin-left:4px">${TS_LABEL[f.ts]}</span></div></div>

    <thead><tr><th>Belge Adı</th><th>Tür</th><th>Hazırlanma</th><th>Bitiş Tarihi</th><th>Durum</th><th>Kalan</th><th></th></tr></thead><tbody>`;
  if(!p.belgeler.length) h+=`<tr><td colspan="7" style="text-align:center;padding:24px;color:#aaa">Henüz belge yok. "+ Belge Ekle" ile ekleyin.</td></tr>`;
  p.belgeler.forEach(b=>{
    const s=st(b.bitis);
    const d=diff(b.bitis);
    const kalanStr=d<0?`${Math.abs(d)} gün geçti`:`${d} gün kaldı`;
    const turBadge=b.tip==='mevzuat'?'<span class="badge badge-blue">Mevzuat</span>':'<span class="badge badge-gray">Manuel</span>';
    h+=`<tr>
      <td style="font-weight:600">${b.ad}</td>
      <td>${turBadge}</td>
      <td style="color:#888">${fmt(b.hazirlik)}</td>
      <td>${fmt(b.bitis)}</td>
      <td><span class="badge badge-${s}">${lbl(s)}</span></td>
      <td style="color:${s==='red'?'#dc2626':s==='amber'?'#d97706':'#16a34a'};font-weight:500;font-size:12px">${kalanStr}</td>
      <td><div class="ibtns">
        <button class="ibtn" onclick="openPersonelBelgeModal('${pid}','${b.id}')">Düzenle</button>
        <button class="ibtn del" onclick="delPersonelBelge('${pid}','${b.id}')">Sil</button>
      </div></td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById('main').innerHTML=h;
  updateBadge();
}

// ============================================================
// STATS & BİLDİRİM
// ============================================================
function calcGlobalStats(){
  let exp=0,son=0,ok=0;
  firmalar.forEach(f=>f.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else ok++;}));
  personeller.forEach(p=>p.belgeler.forEach(b=>{const s=st(b.bitis);if(s==='red')exp++;else if(s==='amber')son++;else ok++;}));
  return{exp,son,ok};
}
function getAlerts(){
  const a=[];
  firmalar.forEach(f=>f.belgeler.forEach(b=>{const s=st(b.bitis);if(s!=='green')a.push({type:s,name:f.ad,cat:'Firma',evrak:b.ad,tarih:b.bitis,dif:diff(b.bitis)});}));
  personeller.forEach(p=>{const f=firmalar.find(x=>x.id===p.fid);p.belgeler.forEach(b=>{const s=st(b.bitis);if(s!=='green')a.push({type:s,name:p.ad,cat:'Personel',sub:f?f.ad:'',evrak:b.ad,tarih:b.bitis,dif:diff(b.bitis)});});});
  return a.sort((a,b)=>a.dif-b.dif);
}
function updateBadge(){const n=getAlerts().length;const d=document.getElementById('ndot');if(n>0){d.textContent=n;d.classList.remove('hidden');}else d.classList.add('hidden');}
function openNotif(){
  const alerts=getAlerts();
  document.getElementById('ncnt').textContent=alerts.length?`(${alerts.length} uyarı)`:'';
  let h='';
  if(!alerts.length)h='<div style="text-align:center;padding:24px;color:#aaa">Tüm evraklar geçerli!</div>';
  else alerts.forEach(a=>{
    const ini=a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const desc=a.dif<0?`${Math.abs(a.dif)} gün önce sona erdi`:`${a.dif} gün içinde sona erecek`;
    h+=`<div class="nitem"><div class="navt ${a.type}">${ini}</div><div class="nbody">
      <div class="nname">${a.name}${a.sub?` <span style="font-weight:400;color:#aaa;font-size:11px">(${a.sub})</span>`:''}</div>
      <div class="ndesc">${a.evrak} · ${a.cat}</div>
      <div class="ndate">${fmt(a.tarih)} · ${desc}</div>
    </div><span class="badge badge-${a.type}">${a.type==='red'?'Geçmiş':'Yakın'}</span></div>`;
  });
  document.getElementById('nlist').innerHTML=h;
  document.getElementById('nov').classList.remove('hidden');
}

// ============================================================
// KAYDET
// ============================================================
function closeModal(){document.getElementById('ov').classList.add('hidden');editId=null;editType=null;editSubType=null;}
function save(){
  if(editType==='firma') saveFirma();
  else if(editType==='firma-belge') saveFirmaBelge();
  else if(editType==='personel') savePersonel();
  else if(editType==='personel-belge') savePersonelBelge();
}

function saveFirma(){
  const ad=document.getElementById('f-ad').value.trim();
  if(!ad){alert('Firma adı zorunlu!');return;}
  if(editId){
    const f=firmalar.find(x=>x.id===editId);
    f.ad=ad;f.ts=document.getElementById('f-ts').value;
    f.nace=document.getElementById('f-nace').value.trim();
    f.vergi=document.getElementById('f-vergi').value.trim();
    f.sgk=document.getElementById('f-sgk').value.trim();
    f.adres=document.getElementById('f-adres').value.trim();
  } else {
    firmalar.push({id:uid(),ad,ts:document.getElementById('f-ts').value,nace:document.getElementById('f-nace').value.trim(),vergi:document.getElementById('f-vergi').value.trim(),sgk:document.getElementById('f-sgk').value.trim(),adres:document.getElementById('f-adres').value.trim(),belgeler:[]});
  }
  closeModal();render();
}

function saveFirmaBelge(){
  const f=firmalar.find(x=>x.id===curFirmaId);
  if(!f)return;
  const tipVal=document.getElementById('b-tip').value;
  const hazirlik=document.getElementById('b-hazirlik').value;
  const bitis=document.getElementById('b-bitis').value;
  if(!hazirlik||!bitis){alert('Hazırlanma ve bitiş tarihi zorunlu!');return;}
  let rec;
  if(tipVal.startsWith('mevzuat_')){
    const key=tipVal.replace('mevzuat_','');
    const mev=MEVZUAT_BELGELER.find(m=>m.key===key);
    rec={id:editId||uid(),ad:mev?mev.label:key,tip:'mevzuat',key,hazirlik,bitis};
  } else {
    const ad=document.getElementById('b-ad').value.trim();
    if(!ad){alert('Belge adı zorunlu!');return;}
    const sure=parseInt(document.getElementById('b-sure').value);
    rec={id:editId||uid(),ad,tip:'manuel',sure,hazirlik,bitis};
  }
  if(editId){const i=f.belgeler.findIndex(x=>x.id===editId);f.belgeler[i]=rec;}
  else f.belgeler.push(rec);
  closeModal();renderFirma();
}

function savePersonel(){
  const ad=document.getElementById('p-ad').value.trim();
  if(!ad){alert('Ad Soyad zorunlu!');return;}
  if(editId){
    const p=personeller.find(x=>x.id===editId);
    p.ad=ad;p.sicil=document.getElementById('p-sicil').value.trim();p.gorev=document.getElementById('p-gorev').value.trim();
  } else {
    personeller.push({id:uid(),fid:curFirmaId,ad,sicil:document.getElementById('p-sicil').value.trim(),gorev:document.getElementById('p-gorev').value.trim(),belgeler:[]});
  }
  closeModal();render();
}

function savePersonelBelge(){
  const pid=editSubType;
  const p=personeller.find(x=>x.id===pid);
  if(!p)return;
  const tipVal=document.getElementById('pb-tip').value;
  const hazirlik=document.getElementById('pb-hazirlik').value;
  const bitis=document.getElementById('pb-bitis').value;
  if(!hazirlik||!bitis){alert('Hazırlanma ve bitiş tarihi zorunlu!');return;}
  let rec;
  if(tipVal.startsWith('mevzuat_')){
    const key=tipVal.replace('mevzuat_','');
    const PERS_MEVZUAT=[{key:'isg_egitim',label:'İSG Eğitimi'},{key:'saglik',label:'Sağlık Raporu'},{key:'ilkyardim',label:'İlk Yardım Eğitimi'},{key:'mesleki',label:'Mesleki Yeterlilik Belgesi'}];
    const mev=PERS_MEVZUAT.find(m=>m.key===key);
    rec={id:editId||uid(),ad:mev?mev.label:key,tip:'mevzuat',key,hazirlik,bitis};
  } else {
    const ad=document.getElementById('pb-ad').value.trim();
    if(!ad){alert('Belge adı zorunlu!');return;}
    const sure=parseInt(document.getElementById('pb-sure').value);
    rec={id:editId||uid(),ad,tip:'manuel',sure,hazirlik,bitis};
  }
  if(editId){const i=p.belgeler.findIndex(x=>x.id===editId);p.belgeler[i]=rec;}
  else p.belgeler.push(rec);
  closeModal();goPersonel(pid);
}

function delFirma(id){
  if(!confirm('Bu firmayı ve tüm personellerini silmek istediğinizden emin misiniz?'))return;
  firmalar=firmalar.filter(x=>x.id!==id);
  personeller=personeller.filter(x=>x.fid!==id);

}
